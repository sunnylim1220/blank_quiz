<div class="app">

<div id="allProblemsArea"><div class="emptyMessage">문제를 불러오는 중입니다.</div></div>

<script>
const REMOTE_PROBLEMS_URL = './problems.json';
const ANSWER_STORAGE_KEY = 'blankQuizUserAnswers_v6_pkey';
const SHUFFLE_ORDER_STORAGE_KEY = 'blankQuizShuffleOrder_v1';
const ANALYSIS_CACHE_KEY = 'blankQuizAnalysisCache_v6_pkey';
const ANALYSIS_CACHE_VERSION = 'v6_pkey_mapping_fixed';
const PROBLEMS_PER_PAGE = 5;
const PAGE_BUTTON_COUNT = 10;

const TOPIC_PALETTES = {
  blue:   { bg:'#eff6ff', border:'#bfdbfe', text:'#1d4ed8' },
  purple: { bg:'#f5f3ff', border:'#ddd6fe', text:'#6d28d9' },
  orange: { bg:'#fff7ed', border:'#fed7aa', text:'#c2410c' },
  pink:   { bg:'#fdf2f8', border:'#fbcfe8', text:'#be185d' },
  green:  { bg:'#f0fdf4', border:'#bbf7d0', text:'#15803d' },
  teal:   { bg:'#f0fdfa', border:'#99f6e4', text:'#0f766e' },
  yellow: { bg:'#fefce8', border:'#fde68a', text:'#a16207' },
  gray:   { bg:'#f9fafb', border:'#d1d5db', text:'#374151' }
};
function topicColorKey(topic, problem = null) {
  if (problem && problem.topicColor && TOPIC_PALETTES[problem.topicColor]) return problem.topicColor;
  const t = String(topic || '').trim();
  const found = rawProblems.find(p => String(p.topic || '').trim() === t && p.topicColor && TOPIC_PALETTES[p.topicColor]);
  if (found) return found.topicColor;
  if (t === '과학') return 'blue';
  if (t === '사회') return 'purple';
  if (t === '역사') return 'orange';
  if (t === '예술') return 'pink';
  return 'gray';
}
function topicStyle(topic, problem = null) {
  const c = TOPIC_PALETTES[topicColorKey(topic, problem)] || TOPIC_PALETTES.gray;
  return `background:${c.bg};border-color:${c.border};color:${c.text};`;
}


// ▼▼▼ 배포한 Cloudflare 워커 주소 (https:// 포함) ▼▼▼
const ANALYSIS_PROXY_URL = 'https://blank.sunnylim1220.workers.dev';
// ▲▲▲ 주소가 바뀌면 이 한 줄만 교체하면 됩니다 ▲▲▲

let rawProblems = [];
let allProblems = [];       // 전체(빌드 완료) — 현재(셔플 반영) 순서
let baseAllProblems = [];   // 전체(빌드 완료) — 원래 순서
let problems = [];          // 필터 적용된 화면용 목록
let currentPage = 1;
try {
  if (localStorage.getItem('blankQuizAnalysisCacheVersion') !== ANALYSIS_CACHE_VERSION) {
    localStorage.removeItem(ANALYSIS_CACHE_KEY);
    localStorage.setItem('blankQuizAnalysisCacheVersion', ANALYSIS_CACHE_VERSION);
  }
} catch(e) {}
let filterState = { difficulty: '', topic: '' };

// 드래그 선택/입력 관련 상태 (기존 동작 유지)
let dragSelecting = false;
let dragSelectionStart = null;
let dragSelectionEnd = null;
let dragSelectionPkey = null;

const allProblemsArea = document.getElementById('allProblemsArea');
const topPagination = document.getElementById('topPagination');
const filterDifficulty = document.getElementById('filterDifficulty');
const filterTopic = document.getElementById('filterTopic');
const filterCount = document.getElementById('filterCount');
const analysisOverlay = document.getElementById('analysisOverlay');
const analysisModal = document.getElementById('analysisModal');
const inputNotice = document.getElementById('inputNotice');

function escapeHtml(value) {
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function isWhitespace(ch) { return /\s/.test(ch); }
function isKoreanText(s) { return /[\u3131-\u318E\uAC00-\uD7A3]/.test(String(s)); }
let inputNoticeTimer = null;
function showInputNotice(message) {
  if (!inputNotice) return;
  inputNotice.textContent = message;
  inputNotice.classList.add('show');
  clearTimeout(inputNoticeTimer);
  inputNoticeTimer = setTimeout(() => inputNotice.classList.remove('show'), 1500);
}
function isWordChar(ch) { return /[A-Za-z'\-]/.test(ch); }

function readUnderscoreGroup(text, startIndex) {
  let i = startIndex, count = 0;
  while (i < text.length) {
    if (text[i] === '_') { count++; i++; continue; }
    if (isWhitespace(text[i])) {
      let j = i;
      while (j < text.length && isWhitespace(text[j])) j++;
      if (text[j] === '_') { i = j; continue; }
    }
    break;
  }
  return { endIndex: i, count };
}
function consumeAnswerFromOriginal(original, originalIndex, count) {
  let answer = '', i = originalIndex;
  while (i < original.length && answer.length < count) {
    if (!isWhitespace(original[i])) answer += original[i];
    i++;
  }
  return { answer, nextOriginalIndex: i };
}
function syncOriginalToVisibleChar(original, originalIndex, targetChar) {
  let i = originalIndex;
  while (i < original.length) {
    if (original[i] === targetChar) return i + 1;
    i++;
  }
  return originalIndex;
}
// 빈칸이 속한 '전체 단어' 범위를 원문에서 찾는다 (결과 분석용)
function wordSpan(text, start, end) {
  let s = start;
  while (s > 0 && isWordChar(text[s - 1])) s--;
  let e = end;
  while (e < text.length && isWordChar(text[e])) e++;
  return { s, e };
}
function renderLetterInputs(problemId, groupId, answer) {
  let html = `<span class="wordPart" data-problem="${problemId}" data-group="${groupId}">`;
  for (let i = 0; i < answer.length; i++) {
    const answerChar = escapeHtml(answer[i] || '');
    html += `<input class="letterInput" data-problem="${problemId}" data-group="${groupId}" data-index="${i}" data-answer-char="${answerChar}" maxlength="1" autocomplete="off" spellcheck="false" inputmode="latin" />`;
  }
  return html + '</span>';
}
function buildQuizData(problemId, original, masked) {
  let html = '', blanks = [], oi = 0, mi = 0;
  while (mi < masked.length) {
    const mChar = masked[mi];
    if (mChar === '_') {
      const group = readUnderscoreGroup(masked, mi);
      const oStart = oi;
      const consumed = consumeAnswerFromOriginal(original, oi, group.count);
      const answer = consumed.answer;
      const oEnd = consumed.nextOriginalIndex;
      if (answer.length !== group.count) throw new Error('원문과 빈칸 문단의 길이가 맞지 않습니다.');
      const span = wordSpan(original, oStart, oEnd);
      const fullWord = original.slice(span.s, span.e);
      const prefix = original.slice(span.s, oStart);
      const suffix = original.slice(oEnd, span.e);
      const id = blanks.length;
      blanks.push({ id, answer, fullWord, prefix, suffix });
      html += renderLetterInputs(problemId, id, answer);
      oi = consumed.nextOriginalIndex;
      mi = group.endIndex;
      continue;
    }
    html += escapeHtml(mChar);
    if (!isWhitespace(mChar)) oi = syncOriginalToVisibleChar(original, oi, mChar);
    else while (oi < original.length && isWhitespace(original[oi])) oi++;
    mi++;
  }
  return { html, blanks };
}
async function fetchProblems() {
  const url = REMOTE_PROBLEMS_URL + '?v=' + Date.now();
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('문제 데이터를 불러오지 못했습니다.');
  const data = await res.json();
  if (!Array.isArray(data) || !data.length) throw new Error('문제 데이터가 비어 있습니다.');
  return data;
}
function getProblemKey(problem) {
  const base = String(problem.original || '') + '::' + String(problem.masked || '');
  let hash = 0;
  for (let i = 0; i < base.length; i++) hash = ((hash << 5) - hash + base.charCodeAt(i)) | 0;
  return 'p' + Math.abs(hash);
}
function applySavedShuffleOrder() {
  baseAllProblems = allProblems.slice();
  const saved = localStorage.getItem(SHUFFLE_ORDER_STORAGE_KEY);
  if (!saved) return;
  try {
    const savedKeys = JSON.parse(saved);
    if (!Array.isArray(savedKeys) || savedKeys.length !== allProblems.length) return;
    const map = new Map(allProblems.map(p => [getProblemKey(p), p]));
    const reordered = savedKeys.map(key => map.get(key)).filter(Boolean);
    if (reordered.length === allProblems.length) allProblems = reordered;
  } catch(e) {}
}
function rebuildProblems() {
  allProblems = rawProblems.map((p, index) => {
    const problemKey = getProblemKey(p);
    try {
      const data = buildQuizData(index, p.original || '', p.masked || '');
      return { ...p, problemKey, html: data.html, blanks: data.blanks, valid: true };
    } catch (e) {
      return { ...p, problemKey, html: '', blanks: [], valid: false, error: e.message };
    }
  });
  applySavedShuffleOrder();
}

/* ===== 필터 (난도 / 대주제 / 소주제) ===== */
function buildTaxonomy() {
  const topics = new Set();
  allProblems.forEach(p => {
    const t = (p.topic || '').trim();
    if (t) topics.add(t);
  });
  return Array.from(topics).sort((a, b) => a.localeCompare(b, 'ko'));
}
function populateFilters() {
  const topics = buildTaxonomy();
  filterTopic.innerHTML = '<option value="">전체</option>' + topics.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  filterTopic.value = filterState.topic && topics.includes(filterState.topic) ? filterState.topic : '';

function updateTopicSelectColor() {

function matchesFilter(p) {

function renderTopPagination(totalPages) {
  if (totalPages <= 1) { topPagination.innerHTML = ''; return; }

  const makePage = page => {
    if (!page || page < 1 || page > totalPages) return '<span class="pageSlot empty"></span>';
    return `<span class="pageSlot"><button class="pageNumberBtn ${page === currentPage ? 'active' : ''}" data-page="${page}">${page}</button></span>`;
  };
  const makeEllipsis = show => show
    ? '<span class="pageSlot pageEllipsis">···</span>'
    : '<span class="pageSlot empty"></span>';

  const firstSlot = currentPage >= 4 ? 1 : null;
  const beforeEllipsis = currentPage >= 5;
  const leftSlot = currentPage > 1 ? currentPage - 1 : null;
  const centerSlot = currentPage;
  const rightSlot = currentPage < totalPages ? currentPage + 1 : null;
  const afterEllipsis = currentPage <= totalPages - 3;
  const lastSlot = currentPage <= totalPages - 2 ? totalPages : null;

  topPagination.innerHTML = `
    <button id="prevPageArrowBtn" ${currentPage === 1 ? 'disabled' : ''}>◀ 이전</button>
    ${makePage(firstSlot)}
    ${makeEllipsis(beforeEllipsis)}
    ${makePage(leftSlot)}
    ${makePage(centerSlot)}
    ${makePage(rightSlot)}
    ${makeEllipsis(afterEllipsis)}
    ${makePage(lastSlot)}
    <button id="nextPageArrowBtn" ${currentPage === totalPages ? 'disabled' : ''}>다음 ▶</button>`;
}
function diffClass(d) { return d === '상' ? 'diff-high' : d === '하' ? 'diff-low' : 'diff-mid'; }
function topicClass(topic) {

function metaBadges(problem) {

  if (problem.difficulty) parts.push(`<span class="metaBadge ${diffClass(problem.difficulty)}">${escapeHtml(problem.difficulty)}</span>`);
  if (problem.topic) parts.push(`<span class="metaBadge topicBadge" style="${topicStyle(problem.topic, problem)}">${escapeHtml(problem.topic)}</span>`);
  return parts.length ? `<div class="problemMeta">${parts.join('')}</div>` : '';
}
function renderAllProblems() {

function normalizeAnswer(value) { return String(value).trim().toLowerCase(); }
function loadUserAnswers() {

  catch (e) { return {}; }
}
function getProblemByKey(pkey) {

         allProblems.find(p => (p.problemKey || getProblemKey(p)) === pkey) ||

function getAnswerKey(input) {

}
function saveUserAnswer(input) {

function clearProblemInputsByKey(pkey) {

function restoreSavedAnswersForVisibleInputs() {
  const answers = loadUserAnswers();
  document.querySelectorAll('.letterInput').forEach(input => {
    const key = getAnswerKey(input);
    if (answers[key]) input.value = answers[key];
  });
  document.querySelectorAll('.wordPart').forEach(group => {
    const firstInput = group.querySelector('.letterInput');
    if (firstInput) checkGroup(firstInput);
  });
}
function checkGroup(input) {
  const pkey = input.dataset.pkey;
  const problem = getProblemByKey(pkey);
  if (!problem) return;
  const groupId = Number(input.dataset.group);
  const groupInputs = Array.from(document.querySelectorAll(`.letterInput[data-pkey="${pkey}"][data-group="${groupId}"]`)).sort((a,b) => Number(a.dataset.index) - Number(b.dataset.index));
  const blank = problem.blanks[groupId];
  if (!blank) return;
  const answer = blank.answer;
  const userAnswer = groupInputs.map(el => el.value).join('');
  const isComplete = groupInputs.every(el => el.value.trim());
  groupInputs.forEach(el => el.classList.remove('correct','wrong'));
  if (!isComplete) return;
  groupInputs.forEach(el => el.classList.add(normalizeAnswer(userAnswer) === normalizeAnswer(answer) ? 'correct' : 'wrong'));
}
function getAllInputs() { return Array.from(document.querySelectorAll('.letterInput')); }
function getProblemInputs(input) {
  const block = input.closest('.problemBlock');
  return block ? Array.from(block.querySelectorAll('.letterInput')) : [input];
}
function getProblemInputsByKey(pkey) {
  return Array.from(document.querySelectorAll(`.letterInput[data-pkey="${pkey}"]`));
}
function clearInputSelection() {
  document.querySelectorAll('.letterInput.selected').forEach(el => el.classList.remove('selected'));
  dragSelectionStart = null;
  dragSelectionEnd = null;
  dragSelectionPkey = null;
}
function markInputSelection(startIndex, endIndex, pkey) {
  const inputs = pkey ? getProblemInputsByKey(pkey) : getAllInputs();
  const start = Math.min(startIndex, endIndex);
  const end = Math.max(startIndex, endIndex);
  document.querySelectorAll('.letterInput.selected').forEach(el => {
    if (!pkey || el.dataset.pkey !== pkey) el.classList.remove('selected');
  });
  inputs.forEach((input, idx) => input.classList.toggle('selected', idx >= start && idx <= end));
  dragSelectionStart = start;
  dragSelectionEnd = end;
  dragSelectionPkey = pkey || null;
}
function deleteSelectedInputs(direction = 'backward', referenceInput = null) {
  const selected = Array.from(document.querySelectorAll('.letterInput.selected'));
  if (!selected.length) return false;

  const pkey = referenceInput ? referenceInput.dataset.pkey : (selected[0] ? selected[0].dataset.pkey : '');
  const inputs = pkey ? getProblemInputsByKey(pkey) : getAllInputs();
  const selectedInProblem = selected.filter(el => !pkey || el.dataset.pkey === pkey);
  const indices = selectedInProblem.map(el => inputs.indexOf(el)).filter(i => i >= 0).sort((a,b) => a-b);
  const firstIndex = indices.length ? indices[0] : -1;
  const lastIndex = indices.length ? indices[indices.length - 1] : -1;

  selectedInProblem.forEach(input => {
    input.value = '';
    input.classList.remove('correct', 'wrong');
    saveUserAnswer(input);
    checkGroup(input);
  });

  clearInputSelection();
  let focusTarget = null;
  if (direction === 'forward') {
    focusTarget = inputs[lastIndex + 1] || inputs[lastIndex] || referenceInput || selectedInProblem[selectedInProblem.length - 1];
  } else {
    focusTarget = inputs[firstIndex - 1] || inputs[firstIndex] || referenceInput || selectedInProblem[0];
  }
  if (focusTarget) focusTarget.focus();
  return true;
}
function clearAndSaveInput(input) {
  input.value = '';
  input.classList.remove('correct', 'wrong');
  saveUserAnswer(input);
  checkGroup(input);
}
function normalizeTypedLetter(input, key) {
  const answerChar = input && input.dataset ? String(input.dataset.answerChar || '') : '';
  return /[A-Z]/.test(answerChar) ? key.toUpperCase() : key.toLowerCase();
}
function setStableCaret(input) {
  try { input.setSelectionRange(input.value.length, input.value.length); } catch (e) {}
}
function findVerticalInput(input, direction) {
  const inputs = getProblemInputs(input).filter(el => el.offsetParent !== null);
  const currentRect = input.getBoundingClientRect();
  const currentX = currentRect.left + currentRect.width / 2;
  const currentY = currentRect.top + currentRect.height / 2;
  const candidates = inputs.map(el => {
    const rect = el.getBoundingClientRect();
    return { el, x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
  }).filter(item => direction === 'up' ? item.y < currentY - 6 : item.y > currentY + 6);
  if (!candidates.length) return null;
  const nearestY = direction === 'up'
    ? Math.max(...candidates.map(item => item.y))
    : Math.min(...candidates.map(item => item.y));
  const rowCandidates = candidates.filter(item => Math.abs(item.y - nearestY) <= 8);
  rowCandidates.sort((a, b) => Math.abs(a.x - currentX) - Math.abs(b.x - currentX));
  return rowCandidates[0] ? rowCandidates[0].el : null;
}
function goToPage(page) {
  const totalPages = Math.max(1, Math.ceil(problems.length / PROBLEMS_PER_PAGE));
  currentPage = Math.min(Math.max(1, Number(page) || 1), totalPages);
  renderAllProblems();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function shuffleProblems() {
  if (allProblems.length <= 1) return;
  const shuffled = allProblems.slice();
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  allProblems = shuffled;
  localStorage.setItem(SHUFFLE_ORDER_STORAGE_KEY, JSON.stringify(allProblems.map(getProblemKey)));
  applyFilter();
  goToPage(1);
}
function resetProblemOrder() {
  localStorage.removeItem(SHUFFLE_ORDER_STORAGE_KEY);
  allProblems = baseAllProblems.slice();
  applyFilter();
  goToPage(1);
}

/* ===== 결과 분석 (Cloudflare 워커 호출) ===== */
function loadAnalysisCache() {
  try { const c = JSON.parse(localStorage.getItem(ANALYSIS_CACHE_KEY) || '{}'); return c && typeof c === 'object' ? c : {}; }
  catch(e) { return {}; }
}
function saveAnalysisCache(cache) { localStorage.setItem(ANALYSIS_CACHE_KEY, JSON.stringify(cache)); }
function analysisCacheKey(group, item) {
  return `${group.problemKey}::${item.idx}::${normalizeAnswer(item.word || '')}::${normalizeAnswer(item.userAnswer || '')}`;
}

// 현재 필터된 목록에서 '응답했지만 틀린' 빈칸을 모은다
function gatherWrongGroups() {
  const answers = loadUserAnswers();
  const groups = [];
  problems.forEach(p => {
    if (!p.valid || !Array.isArray(p.blanks)) return;
    const key = p.problemKey || getProblemKey(p);
    const items = [];
    p.blanks.forEach(b => {
      const L = b.answer.length;
      let typed = '';
      let filled = 0;
      for (let i = 0; i < L; i++) {
        const v = answers[`${key}-${b.id}-${i}`] || '';
        typed += v;
        if (v) filled++;
      }
      if (filled !== L) return;
      if (normalizeAnswer(typed) === normalizeAnswer(b.answer)) return;
      const studentAttempt = (b.prefix || '') + typed + (b.suffix || '');
      items.push({ idx: b.id, word: b.fullWord, userAnswer: studentAttempt });
    });
    if (items.length) groups.push({
      problemKey: key,
      passage: p.original || '',
      items,
      title: p.title || '',
      difficulty: p.difficulty || '',
      topic: p.topic || ''
    });
  });
  return groups;
}

async function fetchAnalysis(passage, items) {
  const res = await fetch(ANALYSIS_PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ passage, items })
  });
  let data = {};
  try { data = await res.json(); } catch(e) {}
  if (!res.ok || data.error) throw new Error(data.error || ('요청 실패 (HTTP ' + res.status + ')'));
  return Array.isArray(data.analyses) ? data.analyses : [];
}

function openAnalysisOverlay(innerHtml) {
  analysisModal.innerHTML = innerHtml;
  analysisOverlay.style.display = 'flex';
}
function closeAnalysisOverlay() { analysisOverlay.style.display = 'none'; }

function analysisHeadHtml(subtitle) {
  return `<div class="amHead">
    <div class="amTitle">결과 분석${subtitle ? ` <span class="amNote">${escapeHtml(subtitle)}</span>` : ''}</div>
    <button class="amClose" id="amCloseBtn">닫기</button>
  </div>`;
}

async function runAnalysis() {
  if (!ANALYSIS_PROXY_URL || ANALYSIS_PROXY_URL.indexOf('http') !== 0) {
    openAnalysisOverlay(analysisHeadHtml('') + `<div class="amError">분석 서버 주소가 설정되지 않았습니다.</div>`);
    bindModalClose();
    return;
  }
  const scopeLabel = (filterState.difficulty || filterState.topic || '')
    ? `현재 필터 기준 (${[filterState.difficulty, filterState.topic].filter(Boolean).join(' · ')})`
    : '전체 문제 기준';
  const groups = gatherWrongGroups();

  if (!groups.length) {
    openAnalysisOverlay(analysisHeadHtml(scopeLabel) +
      `<div class="amSection"><div class="amSummaryRow">분석할 오답이 없습니다. 빈칸을 끝까지 입력한 것 중 <b>틀린 것</b>만 분석합니다.</div>
       <div class="amNote" style="margin-top:6px;">(미완성 빈칸과 정답은 제외됩니다.)</div></div>`);
    bindModalClose();
    return;
  }

  openAnalysisOverlay(analysisHeadHtml(scopeLabel) +
    `<div class="amSection"><div class="amSummaryRow" id="amProgress">분석 준비 중…</div></div>`);
  bindModalClose();

  const cache = loadAnalysisCache();
  const progress = document.getElementById('amProgress');
  const totalProblems = groups.length;
  let done = 0;
  let failed = 0;

  for (const g of groups) {
    const uncached = g.items.filter(it => !cache[analysisCacheKey(g, it)]);
    if (uncached.length) {
      try {
        const analyses = await fetchAnalysis(g.passage, uncached);
        analyses.forEach(a => {
          const idx = Number(a.idx);
          const found = uncached.find(u => u.idx === idx) || uncached[0];
          const key = analysisCacheKey(g, found || { idx: (a.idx !== undefined ? idx : 0), userAnswer: '' });
          cache[key] = {
            word: a.word || (found ? found.word : ''),
            pos: a.pos || '', role: a.role || '', meaning: a.meaning || '', reasoning: a.reasoning || ''
          };
        });
        saveAnalysisCache(cache);
      } catch (e) {
        failed++;
        if (progress) progress.innerHTML = `분석 중… (${done}/${totalProblems}) <span class="amError">— 일부 실패: ${escapeHtml(e.message)}</span>`;
      }
    }
    done++;
    if (progress) progress.textContent = `분석 중… (${done}/${totalProblems})`;
  }

  renderAnalysisResult(groups, cache, scopeLabel, failed);
}


function formatRoleLabel(role, pos = '') {
  const raw = String(role || '').trim();
  if (!raw || raw === '—') return '—';
  if (raw.includes(' - ')) return raw;
  const compact = raw.replace(/\s+/g, '');
  const map = {
    '동사수식': '수식어 - 동사 수식',
    '동사구수식': '수식어 - 동사구 수식',
    '형용사수식': '수식어 - 형용사 수식',
    '부사수식': '수식어 - 부사 수식',
    '명사수식': '수식어 - 명사 수식',
    '문장수식': '수식어 - 문장 수식',
    '절수식': '수식어 - 절 수식',
    '구수식': '수식어 - 구 수식',
    '주어': '문장 성분 - 주어',
    '목적어': '문장 성분 - 목적어',
    '보어': '문장 성분 - 보어',
    '주격보어': '문장 성분 - 주격 보어',
    '목적격보어': '문장 성분 - 목적격 보어',
    '서술어': '문장 성분 - 서술어',
    '전치사의목적어': '문장 성분 - 전치사의 목적어',
    '연결어': '담화 기능 - 연결어',
    '접속': '담화 기능 - 접속',
    '접속어': '담화 기능 - 접속어'
  };
  if (map[compact]) return map[compact];
  if (compact.endsWith('수식')) {
    const target = compact.slice(0, -2).replace(/([가-힣]+)구$/, '$1구');
    return `수식어 - ${target} 수식`;
  }
  if (compact.includes('수식')) return raw.startsWith('수식어') ? raw : `수식어 - ${raw.replace(/수식/g, ' 수식').replace(/\s+/g, ' ').trim()}`;
  if (String(pos || '').trim() === '부사') return `수식어 - ${raw}`;
  return raw;
}

function renderAnalysisResult(groups, cache, scopeLabel, failed) {
  const posCount = {};
  const roleCount = {};
  let totalWrong = 0;

  const problemBlocks = groups.map((g, problemNo) => {
    const cards = g.items.map((it, itemNo) => {
      const a = cache[analysisCacheKey(g, it)] || {};
      totalWrong++;
      const pos = a.pos || '—';
      const role = formatRoleLabel(a.role || '—', pos);
      if (a.pos) posCount[a.pos] = (posCount[a.pos] || 0) + 1;
      if (role && role !== '—') roleCount[role] = (roleCount[role] || 0) + 1;
      const correctWord = a.word || it.word;
      return `<div class="amCard">
        <div class="amCompare">
          <span class="amLabel">#${itemNo + 1}</span>
          <span class="amLabel">내 입력</span><span class="amWrongChip">${escapeHtml(it.userAnswer || '(빈칸)')}</span>
          <span class="amArrow">→</span>
          <span class="amLabel">정답</span><span class="amCorrectChip">${escapeHtml(correctWord)}</span>
          ${a.meaning ? `<span class="amMeaningInline">뜻: ${escapeHtml(a.meaning)}</span>` : ''}
        </div>
        <div class="amPos">품사: <b>${escapeHtml(pos)}</b> &nbsp;|&nbsp; 역할: <b>${escapeHtml(role)}</b></div>
        ${a.reasoning ? `<div class="amReason">${escapeHtml(a.reasoning)}</div>` : ''}
      </div>`;
    }).join('');
    const meta = [g.difficulty, g.topic].filter(Boolean).join(' · ');
    const head = `<span class="amLabel">지문 ${problemNo + 1}</span><b>${escapeHtml(g.passage.slice(0, 64))}…</b>${meta ? ` <span class="amNote">[${escapeHtml(meta)}]</span>` : ''}`;
    return `<div class="amProblem"><div class="amProblemHead">${head}</div>${cards}</div>`;
  }).join('');

  const posTags = Object.entries(posCount).sort((a,b) => b[1]-a[1]);
  const roleTags = Object.entries(roleCount).sort((a,b) => b[1]-a[1]);
  const weakPos = posTags.length ? posTags[0][0] : '';
  const posHtml = posTags.length
    ? posTags.map(([k,v]) => `<span class="amTag ${k===weakPos?'weak':''}">${escapeHtml(k)} ${v}</span>`).join('')
    : '<span class="amNote">정보 없음</span>';
  const roleHtml = roleTags.length
    ? roleTags.map(([k,v]) => `<span class="amTag">${escapeHtml(k)} ${v}</span>`).join('')
    : '<span class="amNote">정보 없음</span>';

  const summary = `<div class="amSection">
      <div class="amSectionTitle">요약</div>
      <div class="amSummaryRow"><strong>틀린 빈칸 ${totalWrong}개</strong> · 지문 <strong>${groups.length}개</strong>${failed ? ` <span class="amError">(일부 분석 실패)</span>` : ''}</div>
      <div class="amSummaryRow" style="margin-top:8px;"><span class="amNote">품사별</span><br>${posHtml}</div>
      <div class="amSummaryRow" style="margin-top:8px;"><span class="amNote">역할별</span><br>${roleHtml}</div>
      ${weakPos ? `<div class="amSummaryRow" style="margin-top:8px;">가장 약한 품사: <b>${escapeHtml(weakPos)}</b></div>` : ''}
    </div>`;

  const detail = `<div class="amSection">
      <div class="amSectionTitle">오답 상세</div>
      ${problemBlocks}
      <div class="amNote" style="margin-top:8px;">같은 빈칸이라도 입력한 오답이 바뀌면 새로 분석합니다.</div>
    </div>`;

  openAnalysisOverlay(analysisHeadHtml(scopeLabel) + summary + detail);
  bindModalClose();
}

function bindModalClose() {
  const btn = document.getElementById('amCloseBtn');
  if (btn) btn.addEventListener('click', closeAnalysisOverlay);
}

/* ===== 입력/선택 이벤트 (기존 동작 유지) ===== */
allProblemsArea.addEventListener('input', event => {
  const input = event.target;
  if (!input.classList.contains('letterInput')) return;
  const rawValue = input.value;
  if (isKoreanText(rawValue)) showInputNotice('한글 입력은 제한됩니다.');
  const typed = rawValue.replace(/[^A-Za-z]/g, '');
  input.value = typed ? normalizeTypedLetter(input, typed.slice(-1)) : '';
  setStableCaret(input);
  saveUserAnswer(input);
  checkGroup(input);
});
allProblemsArea.addEventListener('compositionstart', event => {
  if (event.target.classList && event.target.classList.contains('letterInput')) {
    showInputNotice('한글 입력은 제한됩니다.');
  }
});
allProblemsArea.addEventListener('keydown', event => {
  const input = event.target;
  if (!input.classList.contains('letterInput')) return;
  const inputs = getProblemInputs(input);
  const currentIndex = inputs.indexOf(input);

  const focusInput = target => {
    if (!target) return;
    target.focus();
    setStableCaret(target);
  };
  const writeAndSaveInput = (target, value) => {
    target.value = value;
    target.classList.remove('correct', 'wrong');
    saveUserAnswer(target);
    checkGroup(target);
    setStableCaret(target);
  };

  const selectedInputs = Array.from(document.querySelectorAll('.letterInput.selected'));
  const selectedInThisProblem = selectedInputs.filter(el => el.dataset.pkey === input.dataset.pkey);
  if ((event.key === 'Backspace' || event.key === 'Delete') && selectedInThisProblem.length > 1) {
    event.preventDefault();
    deleteSelectedInputs(event.key === 'Delete' ? 'forward' : 'backward', input);
    return;
  }

  // 클릭/드래그 선택 표시는 편집 키와 충돌하지 않도록 단일 선택 상태에서는 해제한다.
  // 모든 이동/삭제는 화면 좌표가 아니라 실제 DOM 순서 기준으로만 처리한다.
  if (selectedInputs.length) clearInputSelection();

  if (/^[A-Za-z]$/.test(event.key)) {
    event.preventDefault();
    writeAndSaveInput(input, normalizeTypedLetter(input, event.key));
    focusInput(inputs[currentIndex + 1]);
    return;
  }

  if (event.key.length === 1) {
    event.preventDefault();
    if (isKoreanText(event.key)) showInputNotice('한글 입력은 제한됩니다.');
    return;
  }

  if (event.key === 'ArrowLeft') {
    event.preventDefault();
    focusInput(inputs[currentIndex - 1]);
    return;
  }
  if (event.key === 'ArrowRight') {
    event.preventDefault();
    focusInput(inputs[currentIndex + 1]);
    return;
  }
  if (event.key === 'ArrowUp') {
    event.preventDefault();
    focusInput(findVerticalInput(input, 'up'));
    return;
  }
  if (event.key === 'ArrowDown') {
    event.preventDefault();
    focusInput(findVerticalInput(input, 'down'));
    return;
  }

  if (event.key === 'Backspace') {
    event.preventDefault();
    if (input.value) {
      clearAndSaveInput(input);
      focusInput(input);
      return;
    }
    const prev = inputs[currentIndex - 1];
    if (prev) {
      clearAndSaveInput(prev);
      focusInput(prev);
    }
    return;
  }

  if (event.key === 'Delete') {
    event.preventDefault();
    if (input.value) {
      clearAndSaveInput(input);
      focusInput(input);
      return;
    }
    const next = inputs[currentIndex + 1];
    if (next) {
      clearAndSaveInput(next);
      focusInput(next);
    }
    return;
  }

  if (event.key === 'Enter') {
    event.preventDefault();
    focusInput(inputs[currentIndex + 1]);
  }
});
allProblemsArea.addEventListener('pointerdown', event => {
  const input = event.target.closest('.letterInput');
  if (!input) {
    clearInputSelection();
    return;
  }
  event.preventDefault();
  const pkey = input.dataset.pkey;
  const inputs = getProblemInputsByKey(pkey);
  const index = inputs.indexOf(input);
  if (index < 0) return;
  dragSelecting = true;
  dragSelectionPkey = pkey;
  markInputSelection(index, index, pkey);
  input.focus();
});
document.addEventListener('pointermove', event => {
  if (!dragSelecting) return;
  const el = document.elementFromPoint(event.clientX, event.clientY);
  const input = el && el.closest ? el.closest('.letterInput') : null;
  if (!input || input.dataset.pkey !== dragSelectionPkey) return;
  const inputs = getProblemInputsByKey(dragSelectionPkey);
  const index = inputs.indexOf(input);
  if (index < 0 || dragSelectionStart === null) return;
  markInputSelection(dragSelectionStart, index, dragSelectionPkey);
});
document.addEventListener('pointerup', () => {
  dragSelecting = false;
});
document.addEventListener('click', event => {
  if (!event.target.closest('.letterInput') && !event.target.closest('.problemBlock')) clearInputSelection();
});
allProblemsArea.addEventListener('click', event => {
  const clearBtn = event.target.closest('[data-clear-pkey]');
  if (clearBtn) {
    clearProblemInputsByKey(clearBtn.dataset.clearPkey);
    return;
  }
  const btn = event.target.closest('[data-toggle-problem]');
  if (!btn) return;
  const block = document.querySelector(`[data-problem-block="${btn.dataset.toggleProblem}"]`);
  const collapsed = !block.classList.contains('collapsed');
  block.classList.toggle('collapsed', collapsed);
  btn.textContent = collapsed ? '▾' : '▴';
  btn.title = collapsed ? '펼치기' : '접기';
  btn.setAttribute('aria-label', collapsed ? '펼치기' : '접기');
});
topPagination.addEventListener('click', event => {
  const totalPages = Math.max(1, Math.ceil(problems.length / PROBLEMS_PER_PAGE));
  if (event.target.id === 'prevPageArrowBtn' && !event.target.disabled) goToPage(currentPage - 1);
  if (event.target.id === 'nextPageArrowBtn' && !event.target.disabled) goToPage(currentPage + 1);
  const pageBtn = event.target.closest('[data-page]');
  if (pageBtn) goToPage(Number(pageBtn.dataset.page));
});
document.getElementById('clearAllInputsBtn').addEventListener('click', clearAllInputs);
document.getElementById('shuffleBtn').addEventListener('click', shuffleProblems);
document.getElementById('resetOrderBtn').addEventListener('click', resetProblemOrder);
document.getElementById('analyzeBtn').addEventListener('click', runAnalysis);
filterDifficulty.addEventListener('change', onFilterChanged);
filterTopic.addEventListener('change', onFilterChanged);
analysisOverlay.addEventListener('click', event => { if (event.target === analysisOverlay) closeAnalysisOverlay(); });
document.addEventListener('keydown', event => { if (event.key === 'Escape' && analysisOverlay.style.display === 'flex') closeAnalysisOverlay(); });

(async function init() {
  try {
    rawProblems = await fetchProblems();
    rebuildProblems();
    populateFilters();
    updateDifficultySelectClass();
    applyFilter();
    renderAllProblems();
  } catch (e) {
    allProblemsArea.innerHTML = `<div class="emptyMessage">문제 데이터를 불러오지 못했습니다. index.html과 problems.json이 같은 폴더에 있는지 확인하세요.<br>${escapeHtml(e.message)}</div>`;
  }
})();
</script>
