<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blank</title>
  <style>
    html { overflow-y: scroll; scrollbar-gutter: stable; min-height: 101vh; }
    * { box-sizing: border-box; font-weight: 400; }
    body { min-height: 101vh; margin: 0; font-family: Arial, sans-serif; background: #fff; color: #111827; font-size: 15px; }
    .app { width: 100%; max-width: 1080px; margin: 0 auto; padding: 12px; }
    h1,button,span,div,input { font-family: Arial, sans-serif; font-weight: 400; }
    h1 { margin: 0; font-size: 11.25px; line-height: 24px; height: 24px; }
    .panel { width: 100%; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .topBar { display: flex; align-items: center; justify-content: space-between; gap: 8px 12px; margin-bottom: 8px; flex-wrap: wrap; }
    .titleRow { display: flex; align-items: center; gap: 12px; flex-wrap: nowrap; flex: 1 1 520px; min-width: 0; }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; flex: 1; min-width: 0; }
    .pagination button { height: 24px; padding: 0 7px; font-size: 11.25px; line-height: 22px; min-width: 26px; }
    .pagination input { width: 46px; height: 24px; border: 1px solid #d1d5db; border-radius: 7px; padding: 0 5px; text-align: center; font-size: 11.25px; line-height: 22px; }
    .pageNumberBtn { font-size: 11.25px; width: 30px; font-variant-numeric: tabular-nums; }
    .pageNumberBtn.active { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
    .pageInfo { color: #4b5563; padding: 0 5px; font-size: 11.25px; line-height: 24px; height: 24px; white-space: nowrap; min-width: 42px; text-align: center; font-variant-numeric: tabular-nums; }
    .toolButtons { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; height:24px; }
    .toolButtons button { height: 24px; padding: 0 9px; font-size: 11.25px; line-height: 22px; white-space: nowrap; }
    .topBar h1, .topBar button, .topBar input, .topBar span, .topBar label, .topBar select { font-size: 11.25px !important; font-family: Arial, sans-serif; font-weight: 400; }
    .topBar button, .topBar input, .topBar select { height: 24px; line-height: 22px; vertical-align: middle; }
    .topBar > *, .titleRow > *, .pagination > *, .toolButtons > * { align-self: center; }
    button { border: 1px solid #d1d5db; border-radius: 7px; padding: 7px 10px; cursor: pointer; background: #fff; color: #111827; }
    button:hover { border-color: #2563eb; }
    button:disabled { opacity: .35; cursor: default; }
    .emptyMessage { border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px; color: #4b5563; }
    #allProblemsArea { width: 100%; }
    .problemBlock { position: relative; display: block; width: 100%; max-width: 100%; min-width: 0; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 32px 10px 12px; margin: 0 0 9px 0; background: #fff; overflow: hidden; }
    .problemBlock.collapsed { padding-bottom: 8px; }
    .problemBlock.collapsed .quizArea { max-height: 2.18em; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .problemBlock.collapsed .wordPart, .problemBlock.collapsed .letterInput { pointer-events: none; }
    .problemHeader { position: absolute; top: 5px; right: 5px; margin: 0; z-index: 2; width: 22px; height: 22px; }
    .problemHeader button, .problemHeader button:hover, .problemHeader button:focus, .problemHeader button:active {
      width: 22px; height: 22px; padding: 0; border-radius: 4px !important; -webkit-border-radius: 4px !important;
      font-size: 13px; line-height: 20px; text-align: center; background: rgba(255,255,255,.9); color: #4b5563;
      overflow: hidden; appearance: none; -webkit-appearance: none; background-clip: padding-box;
    }
    .quizArea { display:block; width:100%; max-width:100%; min-width:0; font-size: 15px; line-height: 2.18; white-space: pre-wrap; color: #111827; letter-spacing: 0; word-spacing: 0; overflow-wrap: anywhere; word-break: normal; }
    .wordPart { display: inline-flex; align-items: baseline; white-space: nowrap; gap: 0; vertical-align: baseline; }
    .letterInput {
      width: 16px; height: 20px; margin: 0; border: 1px solid #e1e3e8; text-align: center; font-size: 15px;
      background: #f6f7f9; outline: none; border-radius: 2px; padding: 0; color: #111827; box-shadow: none;
      letter-spacing: 0; line-height: 18px; vertical-align: baseline;
    }
    .letterInput:focus { border-color: #2563eb; background: #f6f7f9; box-shadow: none; }
    .letterInput.selected { outline: 2px solid #2563eb; outline-offset: 1px; background: #dbeafe; }
    .letterInput.correct { color: #111827; background: #bbf7d0; border-color: #16a34a; }
    .letterInput.wrong { color: #111827; background: #fecaca; border-color: #dc2626; }

    /* ===== 신규 UI (폰트·크기는 기존 규칙과 동일하게 유지) ===== */
    .filterBar { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; margin: 0; height:24px; }
    .filterBar label { display: inline-flex; align-items: center; gap: 5px; color: #4b5563; font-size: 11.25px; height:24px; line-height:24px; }
    .filterBar select { height: 24px; border: 1px solid #d1d5db; border-radius: 7px; padding: 0 6px; font-size: 11.25px; line-height: 22px; font-family: Arial, sans-serif; font-weight: 400; background: #fff; color: #111827; }
    .filterCount { color: #4b5563; font-size: 11.25px; font-variant-numeric: tabular-nums; }
    .problemMeta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .metaBadge { font-size: 11.25px; line-height: 18px; color: #4b5563; border: 1px solid #e5e7eb; border-radius: 6px; padding: 0 6px; background: #f9fafb; white-space: nowrap; }
    .metaBadge.diff-high { color: #b91c1c; border-color: #fecaca; background: #fef2f2; }
    .metaBadge.diff-mid { color: #b45309; border-color: #fde68a; background: #fffbeb; }
    .metaBadge.diff-low { color: #15803d; border-color: #bbf7d0; background: #f0fdf4; }
    .analysisOverlay { position: fixed; inset: 0; background: rgba(17,24,39,.45); display: flex; align-items: flex-start; justify-content: center; padding: 20px 12px; overflow: auto; z-index: 50; }
    .analysisModal { width: 100%; max-width: 880px; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; }
    .analysisModal .amHead { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .analysisModal .amTitle { font-size: 15px; line-height: 1.4; }
    .analysisModal .amClose { height: 24px; padding: 0 9px; font-size: 11.25px; line-height: 22px; }
    .analysisModal .amSection { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
    .analysisModal .amSectionTitle { font-size: 11.25px; color: #4b5563; margin-bottom: 6px; }
    .analysisModal .amSummaryRow { font-size: 15px; line-height: 1.7; }
    .analysisModal .amTag { display: inline-block; font-size: 11.25px; line-height: 18px; color: #1d4ed8; border: 1px solid #bfdbfe; background: #eff6ff; border-radius: 6px; padding: 0 6px; margin: 0 4px 4px 0; white-space: nowrap; }
    .analysisModal .amTag.weak { color: #b91c1c; border-color: #fecaca; background: #fef2f2; }
    .analysisModal .amProblem { border-top: 1px solid #f1f5f9; padding-top: 8px; margin-top: 8px; }
    .analysisModal .amProblem:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
    .analysisModal .amProblemHead { font-size: 11.25px; color: #4b5563; margin-bottom: 6px; }
    .analysisModal .amCard { border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; background: #fff; }
    .analysisModal .amWord { font-size: 15px; }
    .analysisModal .amWord b { color: #16a34a; }
    .analysisModal .amWrong { color: #dc2626; }
    .analysisModal .amPos { font-size: 11.25px; color: #4b5563; margin: 3px 0; }
    .analysisModal .amMeaning { font-size: 15px; margin: 2px 0; }
    .analysisModal .amReason { font-size: 15px; line-height: 1.6; color: #111827; margin-top: 3px; }
    .analysisModal .amNote { font-size: 11.25px; color: #6b7280; }
    .analysisModal .amError { font-size: 15px; color: #b91c1c; line-height: 1.6; }

    @media (max-width:800px) {
      .app { padding: 12px 10px; }
      .topBar, .titleRow { align-items: flex-start; flex-direction: column; }
      .pagination { justify-content: flex-start; }
      .letterInput { width: 17px; height: 22px; font-size: 15px; line-height: 20px; }
    }
  </style>
</head>
<body>
<div class="app">
  <section class="panel">
    <div class="topBar">
      <div class="titleRow">
        <h1>blank</h1>
        <div class="pagination" id="topPagination"></div>
      </div>
      <div class="filterBar" id="filterBar">
        <label>난도
          <select id="filterDifficulty">
            <option value="">전체</option>
            <option value="상">상</option>
            <option value="중">중</option>
            <option value="하">하</option>
          </select>
        </label>
        <label>대주제 <select id="filterTopic"></select></label>
        <span class="filterCount" id="filterCount"></span>
      </div>
      <div class="toolButtons">
        <button id="analyzeBtn">결과 분석</button>
        <button id="shuffleBtn">순서 무작위</button>
        <button id="resetOrderBtn">순서 초기화</button>
      </div>
    </div>
    <div id="allProblemsArea"><div class="emptyMessage">문제를 불러오는 중입니다.</div></div>
  </section>
</div>

<div id="analysisOverlay" class="analysisOverlay" style="display:none;">
  <div class="analysisModal" id="analysisModal"></div>
</div>

<script>
const REMOTE_PROBLEMS_URL = './problems.json';
const ANSWER_STORAGE_KEY = 'blankQuizUserAnswers_v2';
const SHUFFLE_ORDER_STORAGE_KEY = 'blankQuizShuffleOrder_v1';
const ANALYSIS_CACHE_KEY = 'blankQuizAnalysisCache_v1';
const PROBLEMS_PER_PAGE = 5;
const PAGE_BUTTON_COUNT = 10;

// ▼▼▼ 배포한 Cloudflare 워커 주소 (https:// 포함) ▼▼▼
const ANALYSIS_PROXY_URL = 'https://blank.sunnylim1220.workers.dev';
// ▲▲▲ 주소가 바뀌면 이 한 줄만 교체하면 됩니다 ▲▲▲

let rawProblems = [];
let allProblems = [];       // 전체(빌드 완료) — 현재(셔플 반영) 순서
let baseAllProblems = [];   // 전체(빌드 완료) — 원래 순서
let problems = [];          // 필터 적용된 화면용 목록
let currentPage = 1;
let filterState = { difficulty: '', topic: '' };

// 드래그 선택/입력 관련 상태 (기존 동작 유지)
let dragSelecting = false;
let dragSelectionStart = null;
let dragSelectionEnd = null;

const allProblemsArea = document.getElementById('allProblemsArea');
const topPagination = document.getElementById('topPagination');
const filterDifficulty = document.getElementById('filterDifficulty');
const filterTopic = document.getElementById('filterTopic');
const filterCount = document.getElementById('filterCount');
const analysisOverlay = document.getElementById('analysisOverlay');
const analysisModal = document.getElementById('analysisModal');

function escapeHtml(value) {
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function isWhitespace(ch) { return /\s/.test(ch); }
function isKoreanText(s) { return /[\u3131-\u318E\uAC00-\uD7A3]/.test(String(s)); }
function showInputNotice() { /* 기존 동작 유지용 안전 처리(별도 표시 없음) */ }
function isWordChar(ch) { return /[A-Za-z'\-]/.test(ch); }

function readUnderscoreGroup(text, startIndex) {
  let i = startIndex, count = 0;
  while (i < text.length) {
    if (text[i] === '_') { count++; i++; continue; }
    if (isWhitespace(text[i])) {
      let j = i;
      while (j < text.length && isWhitespace(text[j])) j++;
      if (text[j] === '_') { i = j; continue; }
    }
    break;
  }
  return { endIndex: i, count };
}
function consumeAnswerFromOriginal(original, originalIndex, count) {
  let answer = '', i = originalIndex;
  while (i < original.length && answer.length < count) {
    if (!isWhitespace(original[i])) answer += original[i];
    i++;
  }
  return { answer, nextOriginalIndex: i };
}
function syncOriginalToVisibleChar(original, originalIndex, targetChar) {
  let i = originalIndex;
  while (i < original.length) {
    if (original[i] === targetChar) return i + 1;
    i++;
  }
  return originalIndex;
}
// 빈칸이 속한 '전체 단어' 범위를 원문에서 찾는다 (결과 분석용)
function wordSpan(text, start, end) {
  let s = start;
  while (s > 0 && isWordChar(text[s - 1])) s--;
  let e = end;
  while (e < text.length && isWordChar(text[e])) e++;
  return { s, e };
}
function renderLetterInputs(problemId, groupId, answer) {
  let html = `<span class="wordPart" data-problem="${problemId}" data-group="${groupId}">`;
  for (let i = 0; i < answer.length; i++) {
    html += `<input class="letterInput" data-problem="${problemId}" data-group="${groupId}" data-index="${i}" maxlength="1" autocomplete="off" spellcheck="false" inputmode="latin" />`;
  }
  return html + '</span>';
}
function buildQuizData(problemId, original, masked) {
  let html = '', blanks = [], oi = 0, mi = 0;
  while (mi < masked.length) {
    const mChar = masked[mi];
    if (mChar === '_') {
      const group = readUnderscoreGroup(masked, mi);
      const oStart = oi;
      const consumed = consumeAnswerFromOriginal(original, oi, group.count);
      const answer = consumed.answer;
      const oEnd = consumed.nextOriginalIndex;
      if (answer.length !== group.count) throw new Error('원문과 빈칸 문단의 길이가 맞지 않습니다.');
      const span = wordSpan(original, oStart, oEnd);
      const fullWord = original.slice(span.s, span.e);
      const prefix = original.slice(span.s, oStart);
      const suffix = original.slice(oEnd, span.e);
      const id = blanks.length;
      blanks.push({ id, answer, fullWord, prefix, suffix });
      html += renderLetterInputs(problemId, id, answer);
      oi = consumed.nextOriginalIndex;
      mi = group.endIndex;
      continue;
    }
    html += escapeHtml(mChar);
    if (!isWhitespace(mChar)) oi = syncOriginalToVisibleChar(original, oi, mChar);
    else while (oi < original.length && isWhitespace(original[oi])) oi++;
    mi++;
  }
  return { html, blanks };
}
async function fetchProblems() {
  const url = REMOTE_PROBLEMS_URL + '?v=' + Date.now();
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('문제 데이터를 불러오지 못했습니다.');
  const data = await res.json();
  if (!Array.isArray(data) || !data.length) throw new Error('문제 데이터가 비어 있습니다.');
  return data;
}
function getProblemKey(problem) {
  const base = String(problem.original || '') + '::' + String(problem.masked || '');
  let hash = 0;
  for (let i = 0; i < base.length; i++) hash = ((hash << 5) - hash + base.charCodeAt(i)) | 0;
  return 'p' + Math.abs(hash);
}
function applySavedShuffleOrder() {
  baseAllProblems = allProblems.slice();
  const saved = localStorage.getItem(SHUFFLE_ORDER_STORAGE_KEY);
  if (!saved) return;
  try {
    const savedKeys = JSON.parse(saved);
    if (!Array.isArray(savedKeys) || savedKeys.length !== allProblems.length) return;
    const map = new Map(allProblems.map(p => [getProblemKey(p), p]));
    const reordered = savedKeys.map(key => map.get(key)).filter(Boolean);
    if (reordered.length === allProblems.length) allProblems = reordered;
  } catch(e) {}
}
function rebuildProblems() {
  const sortedRawProblems = rawProblems.slice().sort((a, b) => {
    const topicCompare = String(a.topic || '').localeCompare(String(b.topic || ''), 'ko');
    if (topicCompare) return topicCompare;
    return String(a.title || a.original || '').localeCompare(String(b.title || b.original || ''), 'ko', { numeric: true });
  });
  allProblems = sortedRawProblems.map((p, index) => {
    try {
      const data = buildQuizData(index, p.original || '', p.masked || '');
      return { ...p, html: data.html, blanks: data.blanks, valid: true };
    } catch (e) {
      return { ...p, html: '', blanks: [], valid: false, error: e.message };
    }
  });
  applySavedShuffleOrder();
}

/* ===== 필터 (난도 / 대주제 / 소주제) ===== */
function buildTaxonomy() {
  const topics = new Set();
  allProblems.forEach(p => {
    const t = (p.topic || '').trim();
    if (t) topics.add(t);
  });
  return Array.from(topics).sort((a, b) => a.localeCompare(b, 'ko'));
}
function populateFilters() {
  const topics = buildTaxonomy();
  filterTopic.innerHTML = '<option value="">전체</option>' + topics.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  filterTopic.value = filterState.topic && topics.includes(filterState.topic) ? filterState.topic : '';
}
function matchesFilter(p) {
  if (filterState.difficulty && (p.difficulty || '') !== filterState.difficulty) return false;
  if (filterState.topic && (p.topic || '') !== filterState.topic) return false;
  return true;
}
function applyFilter() {
  problems = allProblems.filter(matchesFilter);
  const active = filterState.difficulty || filterState.topic;
  filterCount.textContent = active ? `표시 ${problems.length} / 전체 ${allProblems.length}` : `전체 ${allProblems.length}문제`;
}
function onFilterChanged() {
  filterState.difficulty = filterDifficulty.value;
  filterState.topic = filterTopic.value;
  applyFilter();
  goToPage(1);
}

function renderTopPagination(totalPages) {
  if (totalPages <= 1) { topPagination.innerHTML = ''; return; }
  const currentBlock = Math.floor((currentPage - 1) / PAGE_BUTTON_COUNT);
  const blockStart = currentBlock * PAGE_BUTTON_COUNT + 1;
  const blockEnd = Math.min(totalPages, blockStart + PAGE_BUTTON_COUNT - 1);
  const pageDigits = Math.max(2, String(totalPages).length);
  const currentLabel = String(currentPage).padStart(pageDigits, '0');
  const totalLabel = String(totalPages).padStart(pageDigits, '0');
  let numberButtons = '';
  for (let page = blockStart; page <= blockEnd; page++) {
    const pageLabel = String(page).padStart(pageDigits, '0');
    numberButtons += `<button class="pageNumberBtn ${page === currentPage ? 'active' : ''}" data-page="${page}">${pageLabel}</button>`;
  }
  topPagination.innerHTML = `
    <button id="prevPageArrowBtn" ${currentPage === 1 ? 'disabled' : ''}>‹</button>
    ${numberButtons}
    <button id="nextPageArrowBtn" ${currentPage === totalPages ? 'disabled' : ''}>›</button>
    <span class="pageInfo">${currentLabel}/${totalLabel}</span>
    <input id="pageJumpInput" type="number" min="1" max="${totalPages}" />
    <button id="pageJumpBtn">이동</button>`;
}
function diffClass(d) { return d === '상' ? 'diff-high' : d === '하' ? 'diff-low' : 'diff-mid'; }
function metaBadges(problem) {
  const parts = [];
  if (problem.difficulty) parts.push(`<span class="metaBadge ${diffClass(problem.difficulty)}">${escapeHtml(problem.difficulty)}</span>`);
  if (problem.topic) parts.push(`<span class="metaBadge">${escapeHtml(problem.topic)}</span>`);
  return parts.length ? `<div class="problemMeta">${parts.join('')}</div>` : '';
}
function renderAllProblems() {
  if (!problems.length) {
    const active = filterState.difficulty || filterState.topic;
    allProblemsArea.innerHTML = `<div class="emptyMessage">${active ? '조건에 맞는 문제가 없습니다.' : '등록된 문제가 없습니다.'}</div>`;
    renderTopPagination(1);
    return;
  }
  const totalPages = Math.max(1, Math.ceil(problems.length / PROBLEMS_PER_PAGE));
  currentPage = Math.min(Math.max(1, currentPage), totalPages);
  const startIndex = (currentPage - 1) * PROBLEMS_PER_PAGE;
  const pageProblems = problems.slice(startIndex, startIndex + PROBLEMS_PER_PAGE);
  allProblemsArea.innerHTML = pageProblems.map((problem, pageOffset) => {
    const index = startIndex + pageOffset;
    if (!problem.valid) return `<div class="problemBlock"><div class="quizArea">오류: ${escapeHtml(problem.error)}</div></div>`;
    return `<div class="problemBlock" data-problem-block="${index}">
      <div class="problemHeader"><button data-toggle-problem="${index}" title="접기" aria-label="접기">▴</button></div>
      ${metaBadges(problem)}
      <div class="quizArea">${problem.html}</div>
    </div>`;
  }).join('');
  renderTopPagination(totalPages);
  restoreSavedAnswersForVisibleInputs();
}
function normalizeAnswer(value) { return String(value).trim().toLowerCase(); }
function loadUserAnswers() {
  try { const parsed = JSON.parse(localStorage.getItem(ANSWER_STORAGE_KEY) || '{}'); return parsed && typeof parsed === 'object' ? parsed : {}; }
  catch (e) { return {}; }
}
function getProblemStorageId(problemIndex) { return getProblemKey(problems[problemIndex] || {}); }
function getAnswerKey(input) { return `${getProblemStorageId(Number(input.dataset.problem))}-${input.dataset.group}-${input.dataset.index}`; }
function saveUserAnswer(input) {
  const answers = loadUserAnswers();
  const key = getAnswerKey(input);
  if (input.value) answers[key] = input.value;
  else delete answers[key];
  localStorage.setItem(ANSWER_STORAGE_KEY, JSON.stringify(answers));
}
function restoreSavedAnswersForVisibleInputs() {
  const answers = loadUserAnswers();
  document.querySelectorAll('.letterInput').forEach(input => {
    const key = getAnswerKey(input);
    if (answers[key]) input.value = answers[key];
  });
  document.querySelectorAll('.wordPart').forEach(group => {
    const firstInput = group.querySelector('.letterInput');
    if (firstInput) checkGroup(firstInput);
  });
}
function checkGroup(input) {
  const problemId = Number(input.dataset.problem);
  const groupId = Number(input.dataset.group);
  const groupInputs = Array.from(document.querySelectorAll(`.letterInput[data-problem="${problemId}"][data-group="${groupId}"]`)).sort((a,b) => Number(a.dataset.index) - Number(b.dataset.index));
  const answer = problems[problemId].blanks[groupId].answer;
  const userAnswer = groupInputs.map(el => el.value).join('');
  const isComplete = groupInputs.every(el => el.value.trim());
  groupInputs.forEach(el => el.classList.remove('correct','wrong'));
  if (!isComplete) return;
  groupInputs.forEach(el => el.classList.add(normalizeAnswer(userAnswer) === normalizeAnswer(answer) ? 'correct' : 'wrong'));
}
function getAllInputs() { return Array.from(document.querySelectorAll('.letterInput')); }
function clearInputSelection() {
  document.querySelectorAll('.letterInput.selected').forEach(el => el.classList.remove('selected'));
  dragSelectionStart = null;
  dragSelectionEnd = null;
}
function markInputSelection(startIndex, endIndex) {
  const inputs = getAllInputs();
  const start = Math.min(startIndex, endIndex);
  const end = Math.max(startIndex, endIndex);
  inputs.forEach((input, idx) => input.classList.toggle('selected', idx >= start && idx <= end));
  dragSelectionStart = start;
  dragSelectionEnd = end;
}
function deleteSelectedInputs() {
  const selected = Array.from(document.querySelectorAll('.letterInput.selected'));
  if (!selected.length) return false;
  selected.forEach(input => {
    input.value = '';
    input.classList.remove('correct', 'wrong');
    saveUserAnswer(input);
    checkGroup(input);
  });
  const first = selected[0];
  clearInputSelection();
  if (first) first.focus();
  return true;
}
function goToPage(page) {
  const totalPages = Math.max(1, Math.ceil(problems.length / PROBLEMS_PER_PAGE));
  currentPage = Math.min(Math.max(1, Number(page) || 1), totalPages);
  renderAllProblems();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function shuffleProblems() {
  if (allProblems.length <= 1) return;
  const shuffled = allProblems.slice();
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  allProblems = shuffled;
  localStorage.setItem(SHUFFLE_ORDER_STORAGE_KEY, JSON.stringify(allProblems.map(getProblemKey)));
  applyFilter();
  goToPage(1);
}
function resetProblemOrder() {
  localStorage.removeItem(SHUFFLE_ORDER_STORAGE_KEY);
  allProblems = baseAllProblems.slice();
  applyFilter();
  goToPage(1);
}

/* ===== 결과 분석 (Cloudflare 워커 호출) ===== */
function loadAnalysisCache() {
  try { const c = JSON.parse(localStorage.getItem(ANALYSIS_CACHE_KEY) || '{}'); return c && typeof c === 'object' ? c : {}; }
  catch(e) { return {}; }
}
function saveAnalysisCache(cache) { localStorage.setItem(ANALYSIS_CACHE_KEY, JSON.stringify(cache)); }

// 현재 필터된 목록에서 '응답했지만 틀린' 빈칸을 모은다
function gatherWrongGroups() {
  const answers = loadUserAnswers();
  const groups = [];
  problems.forEach(p => {
    if (!p.valid || !Array.isArray(p.blanks)) return;
    const key = getProblemKey(p);
    const items = [];
    p.blanks.forEach(b => {
      const L = b.answer.length;
      let typed = '';
      let filled = 0;
      for (let i = 0; i < L; i++) {
        const v = answers[`${key}-${b.id}-${i}`] || '';
        typed += v;
        if (v) filled++;
      }
      if (filled !== L) return;                 // 미완성 빈칸은 제외
      if (normalizeAnswer(typed) === normalizeAnswer(b.answer)) return; // 정답 제외
      const studentAttempt = (b.prefix || '') + typed + (b.suffix || '');
      items.push({ idx: b.id, word: b.fullWord, userAnswer: studentAttempt });
    });
    if (items.length) groups.push({ problemKey: key, passage: p.original || '', items,
      title: p.title || '', difficulty: p.difficulty || '', topic: p.topic || '', subtopic: p.subtopic || '' });
  });
  return groups;
}

async function fetchAnalysis(passage, items) {
  const res = await fetch(ANALYSIS_PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ passage, items })
  });
  let data = {};
  try { data = await res.json(); } catch(e) {}
  if (!res.ok || data.error) throw new Error(data.error || ('요청 실패 (HTTP ' + res.status + ')'));
  return Array.isArray(data.analyses) ? data.analyses : [];
}

function openAnalysisOverlay(innerHtml) {
  analysisModal.innerHTML = innerHtml;
  analysisOverlay.style.display = 'flex';
}
function closeAnalysisOverlay() { analysisOverlay.style.display = 'none'; }

function analysisHeadHtml(subtitle) {
  return `<div class="amHead">
    <div class="amTitle">결과 분석${subtitle ? ` <span class="amNote">${escapeHtml(subtitle)}</span>` : ''}</div>
    <button class="amClose" id="amCloseBtn">닫기</button>
  </div>`;
}

async function runAnalysis() {
  if (!ANALYSIS_PROXY_URL || ANALYSIS_PROXY_URL.indexOf('http') !== 0) {
    openAnalysisOverlay(analysisHeadHtml('') + `<div class="amError">분석 서버 주소가 설정되지 않았습니다.</div>`);
    bindModalClose();
    return;
  }
  const scopeLabel = (filterState.difficulty || filterState.topic || filterState.subtopic)
    ? `현재 필터 기준 (${[filterState.difficulty, filterState.topic, filterState.subtopic].filter(Boolean).join(' · ')})`
    : '전체 문제 기준';
  const groups = gatherWrongGroups();

  if (!groups.length) {
    openAnalysisOverlay(analysisHeadHtml(scopeLabel) +
      `<div class="amSection"><div class="amSummaryRow">분석할 오답이 없습니다. 빈칸을 끝까지 입력한 것 중 <b>틀린 것</b>만 분석합니다.</div>
       <div class="amNote" style="margin-top:6px;">(미완성 빈칸과 정답은 제외됩니다.)</div></div>`);
    bindModalClose();
    return;
  }

  openAnalysisOverlay(analysisHeadHtml(scopeLabel) +
    `<div class="amSection"><div class="amSummaryRow" id="amProgress">분석 준비 중…</div></div>`);
  bindModalClose();

  const cache = loadAnalysisCache();
  const progress = document.getElementById('amProgress');
  const totalProblems = groups.length;
  let done = 0;
  let failed = 0;

  for (const g of groups) {
    const uncached = g.items.filter(it => !cache[`${g.problemKey}::${it.idx}`]);
    if (uncached.length) {
      try {
        const analyses = await fetchAnalysis(g.passage, uncached);
        analyses.forEach(a => {
          const idx = Number(a.idx);
          const found = uncached.find(u => u.idx === idx) || uncached[0];
          const key = `${g.problemKey}::${(a.idx !== undefined ? idx : (found ? found.idx : 0))}`;
          cache[key] = {
            word: a.word || (found ? found.word : ''),
            pos: a.pos || '', role: a.role || '', meaning: a.meaning || '', reasoning: a.reasoning || ''
          };
        });
        saveAnalysisCache(cache);
      } catch (e) {
        failed++;
        if (progress) progress.innerHTML = `분석 중… (${done}/${totalProblems}) <span class="amError">— 일부 실패: ${escapeHtml(e.message)}</span>`;
      }
    }
    done++;
    if (progress) progress.textContent = `분석 중… (${done}/${totalProblems})`;
  }

  renderAnalysisResult(groups, cache, scopeLabel, failed);
}

function renderAnalysisResult(groups, cache, scopeLabel, failed) {
  const posCount = {};
  const roleCount = {};
  let totalWrong = 0;

  const problemBlocks = groups.map(g => {
    const cards = g.items.map(it => {
      const a = cache[`${g.problemKey}::${it.idx}`] || {};
      totalWrong++;
      const pos = a.pos || '—';
      const role = a.role || '—';
      if (a.pos) posCount[a.pos] = (posCount[a.pos] || 0) + 1;
      if (a.role) roleCount[a.role] = (roleCount[a.role] || 0) + 1;
      const correctWord = a.word || it.word;
      return `<div class="amCard">
        <div class="amWord">정답 <b>${escapeHtml(correctWord)}</b> &nbsp;·&nbsp; 내 입력 <span class="amWrong">${escapeHtml(it.userAnswer || '(빈칸)')}</span></div>
        <div class="amPos">품사: ${escapeHtml(pos)} &nbsp;|&nbsp; 역할: ${escapeHtml(role)}</div>
        ${a.meaning ? `<div class="amMeaning">뜻: ${escapeHtml(a.meaning)}</div>` : ''}
        ${a.reasoning ? `<div class="amReason">${escapeHtml(a.reasoning)}</div>` : ''}
      </div>`;
    }).join('');
    const meta = [g.difficulty, g.topic, g.subtopic].filter(Boolean).join(' · ');
    const head = `${escapeHtml(g.passage.slice(0, 48))}…${meta ? ` <span class="amNote">[${escapeHtml(meta)}]</span>` : ''}`;
    return `<div class="amProblem"><div class="amProblemHead">${head}</div>${cards}</div>`;
  }).join('');

  const posTags = Object.entries(posCount).sort((a,b) => b[1]-a[1]);
  const roleTags = Object.entries(roleCount).sort((a,b) => b[1]-a[1]);
  const weakPos = posTags.length ? posTags[0][0] : '';
  const posHtml = posTags.length
    ? posTags.map(([k,v]) => `<span class="amTag ${k===weakPos?'weak':''}">${escapeHtml(k)} ${v}</span>`).join('')
    : '<span class="amNote">정보 없음</span>';
  const roleHtml = roleTags.length
    ? roleTags.map(([k,v]) => `<span class="amTag">${escapeHtml(k)} ${v}</span>`).join('')
    : '<span class="amNote">정보 없음</span>';

  const summary = `<div class="amSection">
      <div class="amSectionTitle">요약</div>
      <div class="amSummaryRow">틀린 빈칸 <b>${totalWrong}</b>개 · 지문 <b>${groups.length}</b>개${failed ? ` <span class="amError">(일부 분석 실패)</span>` : ''}</div>
      <div class="amSummaryRow" style="margin-top:6px;"><span class="amNote">품사별</span><br>${posHtml}</div>
      <div class="amSummaryRow" style="margin-top:6px;"><span class="amNote">역할별</span><br>${roleHtml}</div>
      ${weakPos ? `<div class="amSummaryRow" style="margin-top:6px;">가장 약한 품사: <b>${escapeHtml(weakPos)}</b></div>` : ''}
    </div>`;

  const detail = `<div class="amSection">
      <div class="amSectionTitle">오답 상세</div>
      ${problemBlocks}
      <div class="amNote" style="margin-top:8px;">분석 결과는 저장되어, 같은 지문은 다시 호출하지 않습니다.</div>
    </div>`;

  openAnalysisOverlay(analysisHeadHtml(scopeLabel) + summary + detail);
  bindModalClose();
}

function bindModalClose() {
  const btn = document.getElementById('amCloseBtn');
  if (btn) btn.addEventListener('click', closeAnalysisOverlay);
}

/* ===== 입력/선택 이벤트 (기존 동작 유지) ===== */
allProblemsArea.addEventListener('input', event => {
  const input = event.target;
  if (!input.classList.contains('letterInput')) return;
  const typed = input.value.replace(/[^A-Za-z]/g, '');
  input.value = typed ? typed.slice(-1).toLowerCase() : '';
  saveUserAnswer(input);
  checkGroup(input);
  if (input.value) {
    const inputs = getAllInputs();
    const next = inputs[inputs.indexOf(input) + 1];
    if (next) next.focus();
  }
});
allProblemsArea.addEventListener('keydown', event => {
  const input = event.target;
  if (!input.classList.contains('letterInput')) return;
  const inputs = getAllInputs();
  const currentIndex = inputs.indexOf(input);

  if ((event.key === 'Backspace' || event.key === 'Delete') && document.querySelector('.letterInput.selected')) {
    event.preventDefault();
    deleteSelectedInputs();
    return;
  }

  if (event.key === 'ArrowLeft') {
    event.preventDefault();
    clearInputSelection();
    const prev = inputs[currentIndex - 1];
    if (prev) prev.focus();
    return;
  }
  if (event.key === 'ArrowRight') {
    event.preventDefault();
    clearInputSelection();
    const next = inputs[currentIndex + 1];
    if (next) next.focus();
    return;
  }

  if (event.key.length === 1 && !/^[A-Za-z]$/.test(event.key)) {
    event.preventDefault();
    if (isKoreanText(event.key)) showInputNotice('한글 입력은 제한됩니다.');
    return;
  }
  if (event.key === 'Backspace' && !input.value) {
    const prev = inputs[currentIndex - 1];
    if (prev) {
      event.preventDefault();
      clearInputSelection();
      prev.focus();
      prev.value = '';
      prev.classList.remove('correct','wrong');
      saveUserAnswer(prev);
      checkGroup(prev);
    }
  }
  if (event.key === 'Enter') {
    event.preventDefault();
    clearInputSelection();
    const next = inputs[currentIndex + 1];
    if (next) next.focus();
  }
});
allProblemsArea.addEventListener('pointerdown', event => {
  const input = event.target.closest('.letterInput');
  if (!input) {
    clearInputSelection();
    return;
  }
  const inputs = getAllInputs();
  const index = inputs.indexOf(input);
  if (index < 0) return;
  dragSelecting = true;
  markInputSelection(index, index);
  input.focus();
  try { input.setPointerCapture(event.pointerId); } catch(e) {}
});
allProblemsArea.addEventListener('pointerover', event => {
  if (!dragSelecting) return;
  const input = event.target.closest('.letterInput');
  if (!input) return;
  const inputs = getAllInputs();
  const index = inputs.indexOf(input);
  if (index < 0 || dragSelectionStart === null) return;
  markInputSelection(dragSelectionStart, index);
});
document.addEventListener('pointerup', () => {
  dragSelecting = false;
});
document.addEventListener('click', event => {
  if (!event.target.closest('.letterInput') && !event.target.closest('.problemBlock')) clearInputSelection();
});
allProblemsArea.addEventListener('click', event => {
  const btn = event.target.closest('[data-toggle-problem]');
  if (!btn) return;
  const block = document.querySelector(`[data-problem-block="${btn.dataset.toggleProblem}"]`);
  const collapsed = !block.classList.contains('collapsed');
  block.classList.toggle('collapsed', collapsed);
  btn.textContent = collapsed ? '▾' : '▴';
  btn.title = collapsed ? '펼치기' : '접기';
  btn.setAttribute('aria-label', collapsed ? '펼치기' : '접기');
});
topPagination.addEventListener('click', event => {
  const totalPages = Math.max(1, Math.ceil(problems.length / PROBLEMS_PER_PAGE));
  if (event.target.id === 'prevPageArrowBtn' && !event.target.disabled) goToPage(currentPage - 1);
  if (event.target.id === 'nextPageArrowBtn' && !event.target.disabled) goToPage(currentPage + 1);
  const pageBtn = event.target.closest('[data-page]');
  if (pageBtn) goToPage(Number(pageBtn.dataset.page));
  if (event.target.id === 'pageJumpBtn') {
    const input = document.getElementById('pageJumpInput');
    if (input) goToPage(input.value);
  }
});
topPagination.addEventListener('keydown', event => {
  if (event.target.id === 'pageJumpInput' && event.key === 'Enter') {
    event.preventDefault();
    goToPage(event.target.value);
  }
});
document.getElementById('shuffleBtn').addEventListener('click', shuffleProblems);
document.getElementById('resetOrderBtn').addEventListener('click', resetProblemOrder);
document.getElementById('analyzeBtn').addEventListener('click', runAnalysis);
filterDifficulty.addEventListener('change', onFilterChanged);
filterTopic.addEventListener('change', onFilterChanged);
analysisOverlay.addEventListener('click', event => { if (event.target === analysisOverlay) closeAnalysisOverlay(); });
document.addEventListener('keydown', event => { if (event.key === 'Escape' && analysisOverlay.style.display === 'flex') closeAnalysisOverlay(); });

(async function init() {
  try {
    rawProblems = await fetchProblems();
    rebuildProblems();
    populateFilters();
    applyFilter();
    renderAllProblems();
  } catch (e) {
    allProblemsArea.innerHTML = `<div class="emptyMessage">문제 데이터를 불러오지 못했습니다. index.html과 problems.json이 같은 폴더에 있는지 확인하세요.<br>${escapeHtml(e.message)}</div>`;
  }
})();
</script>
