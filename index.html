<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blank</title>
  <style>
    * { box-sizing: border-box; font-weight: 400; }
    body { margin: 0; font-family: Arial, sans-serif; background: #fff; color: #111827; font-size: 15px; }
    .app { max-width: 1080px; margin: 0 auto; padding: 12px; }
    h1,h2,h3,p,button,span,div,input,textarea,label { font-family: Arial, sans-serif; font-weight: 400; font-size: 15px; }
    h1,h2,h3 { margin: 0; }
    .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .topBar,.adminHeader { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .titleRow { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .adminLogin { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .adminLogin input { width:90px; height:30px; border:1px solid #d1d5db; border-radius:7px; padding:0 8px; }
    .problemBlock { position:relative; border:1px solid #e5e7eb; border-radius:10px; padding:10px 32px 10px 12px; margin-bottom:9px; background:#fff; overflow:hidden; }
    .problemBlock.collapsed { padding-bottom:8px; }
    .problemBlock.collapsed .quizArea { display:block; width:100%; max-height:2.32em; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .problemBlock.collapsed .wordPart, .problemBlock.collapsed .letterInput { pointer-events:none; }
    .problemHeader { position:absolute; top:5px; right:5px; margin:0; z-index:2; width:22px; height:22px; }
    .problemHeader button,
    .problemHeader button:hover,
    .problemHeader button:focus,
    .problemHeader button:active {
      width:22px; height:22px; padding:0; border-radius:4px !important; -webkit-border-radius:4px !important;
      font-size:13px; line-height:20px; text-align:center; background:rgba(255,255,255,.9); color:#4b5563;
      overflow:hidden; appearance:none; -webkit-appearance:none; background-clip:padding-box;
    }
    .pagination { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .topPagination { margin:0; }
    .topPagination button { padding:4px 8px; }
    .pageInfo { color:#4b5563; padding:0 6px; }
    button:disabled { opacity:.35; cursor:default; }
    .emptyMessage { border:1px solid #e5e7eb; border-radius:10px; padding:18px; color:#4b5563; }
    .quizArea { font-size:15px; line-height:2.32; white-space:pre-wrap; color:#111827; letter-spacing:0; word-spacing:0; }
    .wordPart { display:inline-flex; align-items:baseline; white-space:nowrap; gap:0; vertical-align:baseline; }
    .letterInput {
      width:16px; height:20px; margin:0; border:1px solid #e1e3e8; text-align:center; font-size:15px;
      background:#f6f7f9; outline:none; border-radius:2px; padding:0; color:#111827; box-shadow:none;
      letter-spacing:0; line-height:18px; vertical-align:baseline;
    }
    .letterInput:focus { border-color:#2563eb; background:#f6f7f9; box-shadow:none; }
    .letterInput.correct { color:#111827; background:#bbf7d0; border-color:#16a34a; }
    .letterInput.wrong { color:#111827; background:#fecaca; border-color:#dc2626; }
    .buttons { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
    button { border:1px solid #d1d5db; border-radius:7px; padding:7px 10px; cursor:pointer; background:#fff; color:#111827; font-size:15px; }
    button.primary { border-color:#2563eb; color:#2563eb; }
    button.danger { border-color:#dc2626; color:#dc2626; }
    button:hover { border-color:#2563eb; }
    .hidden { display:none; }
    .adminGrid { display:grid; grid-template-columns:1fr; gap:18px; margin-top:14px; align-items:stretch; }
    label { display:block; margin-bottom:6px; }
    textarea { width:100%; border:1px solid #d1d5db; border-radius:8px; padding:8px; font-size:15px; line-height:1.7; color:#111827; background:#fff; }
    textarea { min-height:520px; height:520px; resize:vertical; }
    .adminGrid > div { display:flex; flex-direction:column; min-height:100%; }
    #adminOriginal,#adminMasked { flex:1; width:100%; }
    .adminHelp,.adminStatus,.blankCount { color:#4b5563; line-height:1.5; margin:10px 0 0; min-height:30px; }
    .adminStatus { color:#2563eb; }
    .exportBox { border:1px solid #e5e7eb; border-radius:10px; padding:12px; margin-bottom:16px; background:#fff; }
    .exportHeader { margin-bottom:8px; }
    #exportText { min-height:220px; height:220px; white-space:pre-wrap; }
    .registeredList { margin-top:16px; border-top:1px solid #e5e7eb; padding-top:14px; }
    .registeredItem {
      display:grid; grid-template-columns:34px 70px 1fr auto auto; align-items:center; gap:8px;
      border:1px solid #e5e7eb; border-radius:8px; padding:8px; margin-bottom:6px; background:#fff;
      transition:transform .18s ease,border-color .18s ease,background .18s ease,opacity .18s ease;
    }
    .registeredItem.dragging { opacity:.45; transform:scale(.985); border-color:#2563eb; background:#f8fafc; }
    .registeredItem.dropCandidate { border-color:#93c5fd; background:#f8fafc; }
    .dragHandle { cursor:grab; color:#6b7280; text-align:center; user-select:none; }
    .registeredControls,.registeredPager { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:10px 0; }
    #registeredSearch { width:min(360px,100%); height:32px; border:1px solid #d1d5db; border-radius:7px; padding:0 8px; }
    .registeredPreview { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; color:#4b5563; }
    .maskedPreview { width:100%; min-height:120px; max-height:260px; overflow:auto; border:1px solid #d1d5db; border-radius:8px; padding:8px; margin-top:10px; line-height:1.7; white-space:pre-wrap; background:#fafafa; }
    .blankHighlight { background:#fff3a3; border-radius:3px; padding:0 1px; }
    @media (max-width:800px) {
      .app { padding:12px 10px; }
      .topBar,.adminHeader { align-items:flex-start; flex-direction:column; }
      .titleRow { align-items:flex-start; flex-direction:column; }
      .registeredItem { grid-template-columns:1fr; align-items:stretch; }
      textarea { min-height:420px; height:420px; }
      .letterInput { width:17px; height:22px; font-size:15px; line-height:20px; }
    }
  </style>
</head>
<body>
<div class="app">
  <section class="panel" id="quizPanel">
    <div class="topBar">
      <div class="titleRow">
        <h1>blank</h1>
        <div class="pagination topPagination" id="topPagination"></div>
      </div>
      <div class="adminLogin">
        <input id="adminPassword" type="password" placeholder="" autocomplete="off" aria-label="admin password" />
        <button id="downloadDataBtn" class="hidden">데이터 다운로드</button>
      </div>
    </div>
    <div id="exportBox" class="exportBox hidden">
      <div class="exportHeader">문제 데이터 내보내기</div>
      <textarea id="exportText" readonly></textarea>
      <div class="buttons">
        <button id="copyExportBtn">복사</button>
        <button id="closeExportBtn">닫기</button>
      </div>
      <div class="adminHelp">다운로드가 막히면 위 내용을 복사해서 .json 파일로 저장하거나, 그대로 채팅창에 붙여넣으세요.</div>
    </div>
    <div id="allProblemsArea"></div>
  </section>

  <section class="panel hidden" id="adminPanel">
    <div class="adminHeader">
      <h2>관리자 문제 입력/수정</h2>
      <button id="adminBackBtn">문제로 돌아가기</button>
    </div>
    <div class="adminGrid">
      <div>
        <label for="adminOriginal">정답 원문</label>
        <textarea id="adminOriginal" spellcheck="false" placeholder="정답 원문을 입력하세요. 빈칸으로 만들 글자를 드래그한 뒤 버튼을 누르세요."></textarea>
        <div class="buttons">
          <button class="primary" id="blankSelectionBtn">선택 글자 빈칸화</button>
          <button id="resetMaskedBtn">빈칸 초기화</button>
        </div>
        <p class="adminHelp">정답 원문에서 일부 글자를 드래그한 뒤 빈칸화하면, 오른쪽 문단의 같은 위치가 _ 로 바뀝니다. 공백은 빈칸 처리하지 않습니다.</p>
      </div>
      <div>
        <label for="adminMasked">자동 생성된 빈칸 문단</label>
        <div class="blankCount" id="blankWordCount">빈칸 단어 수: 0 / 10</div>
        <textarea id="adminMasked" spellcheck="false" placeholder="정답 원문을 입력하면 자동으로 복사됩니다."></textarea>
        <div class="maskedPreview" id="maskedPreview"></div>
        <div class="buttons">
          <button class="primary" id="addProblemBtn">문제 추가</button>
          <button class="primary hidden" id="saveEditBtn">수정 저장</button>
          <button class="hidden" id="cancelEditBtn">수정 취소</button>
          <button class="danger" id="clearSavedBtn">전체 삭제</button>
        </div>
        <div class="adminStatus" id="adminStatus"></div>
      </div>
    </div>
    <div class="registeredList">
      <h3>등록된 문제</h3>
      <div class="registeredControls">
        <input id="registeredSearch" type="text" placeholder="문제 검색" autocomplete="off" />
        <span id="registeredCount"></span>
      </div>
      <div id="registeredProblems"></div>
      <div class="registeredPager" id="registeredPager"></div>
    </div>
  </section>
</div>

<script>
const DEFAULT_PROBLEMS = [];
const REMOTE_PROBLEMS_URL = './problems.json';
const ADMIN_PASSWORD = 'admin';
const STORAGE_KEY = 'missingLettersQuizProblems';
const ANSWER_STORAGE_KEY = 'blankQuizUserAnswers';
const PROBLEMS_PER_PAGE = 5;
const ADMIN_ITEMS_PER_PAGE = 20;

const quizPanel = document.getElementById('quizPanel');
const adminPanel = document.getElementById('adminPanel');
const allProblemsArea = document.getElementById('allProblemsArea');
const topPagination = document.getElementById('topPagination');
const exportBox = document.getElementById('exportBox');
const exportText = document.getElementById('exportText');
const registeredProblems = document.getElementById('registeredProblems');
const registeredSearch = document.getElementById('registeredSearch');
const registeredCount = document.getElementById('registeredCount');
const registeredPager = document.getElementById('registeredPager');
const adminPassword = document.getElementById('adminPassword');
const adminOriginal = document.getElementById('adminOriginal');
const adminMasked = document.getElementById('adminMasked');
const adminStatus = document.getElementById('adminStatus');
const blankWordCount = document.getElementById('blankWordCount');
const maskedPreview = document.getElementById('maskedPreview');
const addProblemBtn = document.getElementById('addProblemBtn');
const saveEditBtn = document.getElementById('saveEditBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');

let rawProblems = [];
let problems = [];
let editingIndex = null;
let currentPage = 1;
let adminListPage = 1;
const maskedUndoStack = [];

function escapeHtml(value) {
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function isWhitespace(ch) { return /\s/.test(ch); }

function readUnderscoreGroup(text, startIndex) {
  let i = startIndex, count = 0;
  while (i < text.length) {
    if (text[i] === '_') { count++; i++; continue; }
    if (isWhitespace(text[i])) {
      let j = i;
      while (j < text.length && isWhitespace(text[j])) j++;
      if (text[j] === '_') { i = j; continue; }
    }
    break;
  }
  return { endIndex: i, count };
}
function consumeAnswerFromOriginal(original, originalIndex, count) {
  let answer = '', i = originalIndex;
  while (i < original.length && answer.length < count) {
    if (!isWhitespace(original[i])) answer += original[i];
    i++;
  }
  return { answer, nextOriginalIndex: i };
}
function syncOriginalToVisibleChar(original, originalIndex, targetChar) {
  let i = originalIndex;
  while (i < original.length) {
    if (original[i] === targetChar) return i + 1;
    i++;
  }
  return originalIndex;
}
function renderLetterInputs(problemId, groupId, answer) {
  let html = `<span class="wordPart" data-problem="${problemId}" data-group="${groupId}">`;
  for (let i = 0; i < answer.length; i++) {
    html += `<input class="letterInput" data-problem="${problemId}" data-group="${groupId}" data-index="${i}" maxlength="1" autocomplete="off" spellcheck="false" inputmode="latin" />`;
  }
  return html + '</span>';
}
function buildQuizData(problemId, original, masked) {
  let html = '', localBlanks = [], oi = 0, mi = 0;
  while (mi < masked.length) {
    const mChar = masked[mi];
    if (mChar === '_') {
      const group = readUnderscoreGroup(masked, mi);
      const consumed = consumeAnswerFromOriginal(original, oi, group.count);
      const answer = consumed.answer;
      if (answer.length !== group.count) throw new Error('원문과 빈칸 문단의 길이가 맞지 않습니다.');
      const id = localBlanks.length;
      localBlanks.push({ id, answer });
      html += renderLetterInputs(problemId, id, answer);
      oi = consumed.nextOriginalIndex;
      mi = group.endIndex;
      continue;
    }
    html += escapeHtml(mChar);
    if (!isWhitespace(mChar)) oi = syncOriginalToVisibleChar(original, oi, mChar);
    else while (oi < original.length && isWhitespace(original[oi])) oi++;
    mi++;
  }
  return { html, blanks: localBlanks };
}

async function fetchRemoteProblems() {
  const url = REMOTE_PROBLEMS_URL + (REMOTE_PROBLEMS_URL.includes('?') ? '&' : '?') + 'v=' + Date.now();
  const response = await fetch(url, { cache: 'no-store' });
  if (!response.ok) throw new Error('remote problem load failed');
  const data = await response.json();
  if (!Array.isArray(data) || !data.length) throw new Error('remote problem data is empty');
  return data;
}
async function loadRawProblems() {
  try {
    const remote = await fetchRemoteProblems();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(remote));
    return remote;
  } catch (error) {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length) return parsed;
      } catch (error) {}
    }
    return DEFAULT_PROBLEMS.slice();
  }
}
function saveRawProblems() { localStorage.setItem(STORAGE_KEY, JSON.stringify(rawProblems)); }

async function initializeProblems() {
  rawProblems = await loadRawProblems();
  rebuildProblemsFromRaw();
}
function rebuildProblemsFromRaw() {
  problems = [];
  rawProblems.forEach((problem, index) => {
    try {
      const data = buildQuizData(index, problem.original || '', problem.masked || '');
      problems.push({ ...problem, html: data.html, blanks: data.blanks, valid: true });
    } catch (error) {
      problems.push({ ...problem, html: '', blanks: [], valid: false, error: error.message });
    }
  });
  const totalPages = Math.max(1, Math.ceil(problems.length / PROBLEMS_PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;
  renderAllProblems();
  renderRegisteredProblems();
}
function renderTopPagination(totalPages) {
  if (totalPages <= 1) { topPagination.innerHTML = ''; return; }
  topPagination.innerHTML = `
    <button id="topPrevPageBtn" ${currentPage === 1 ? 'disabled' : ''}>이전</button>
    <span class="pageInfo">${currentPage} / ${totalPages}</span>
    <button id="topNextPageBtn" ${currentPage === totalPages ? 'disabled' : ''}>다음</button>`;
}
function renderAllProblems() {
  if (!problems.length) {
    allProblemsArea.innerHTML = '<div class="emptyMessage">등록된 문제가 없습니다.</div>';
    renderTopPagination(1);
    return;
  }
  const totalPages = Math.max(1, Math.ceil(problems.length / PROBLEMS_PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const startIndex = (currentPage - 1) * PROBLEMS_PER_PAGE;
  const pageProblems = problems.slice(startIndex, startIndex + PROBLEMS_PER_PAGE);
  allProblemsArea.innerHTML = pageProblems.map((problem, pageOffset) => {
    const index = startIndex + pageOffset;
    if (!problem.valid) return `<div class="problemBlock"><div class="quizArea">오류: ${escapeHtml(problem.error)}</div></div>`;
    return `<div class="problemBlock" data-problem-block="${index}">
      <div class="problemHeader"><button data-toggle-problem="${index}" title="접기" aria-label="접기">▴</button></div>
      <div class="quizArea" data-quiz-area="${index}">${problem.html}</div>
    </div>`;
  }).join('');
  renderTopPagination(totalPages);
  restoreSavedAnswersForVisibleInputs();
}
function renderRegisteredProblems() {
  const query = (registeredSearch.value || '').trim().toLowerCase();
  const indexed = rawProblems.map((problem, index) => ({ problem, index }));
  const filtered = query ? indexed.filter(item => (String(item.problem.masked || '') + ' ' + String(item.problem.original || '')).toLowerCase().includes(query)) : indexed;
  const totalPages = Math.max(1, Math.ceil(filtered.length / ADMIN_ITEMS_PER_PAGE));
  if (adminListPage > totalPages) adminListPage = totalPages;
  if (adminListPage < 1) adminListPage = 1;
  registeredCount.textContent = `전체 ${rawProblems.length}개 / 표시 ${filtered.length}개`;
  if (!filtered.length) {
    registeredProblems.innerHTML = '<div class="emptyMessage">표시할 문제가 없습니다.</div>';
    registeredPager.innerHTML = '';
    return;
  }
  const start = (adminListPage - 1) * ADMIN_ITEMS_PER_PAGE;
  const visible = filtered.slice(start, start + ADMIN_ITEMS_PER_PAGE);
  registeredProblems.innerHTML = visible.map(item => {
    const preview = String(item.problem.masked || item.problem.original || '').slice(0, 140);
    return `<div class="registeredItem" draggable="true" data-admin-index="${item.index}">
      <span class="dragHandle">☰</span><span>문제 ${item.index + 1}</span>
      <span class="registeredPreview">${escapeHtml(preview)}</span>
      <button data-admin-edit="${item.index}">수정</button>
      <button class="danger" data-admin-delete="${item.index}">삭제</button>
    </div>`;
  }).join('');
  registeredPager.innerHTML = totalPages > 1 ? `
    <button id="adminPrevPageBtn" ${adminListPage === 1 ? 'disabled' : ''}>이전</button>
    <span>${adminListPage} / ${totalPages}</span>
    <button id="adminNextPageBtn" ${adminListPage === totalPages ? 'disabled' : ''}>다음</button>` : '';
}
function normalizeAnswer(value) { return String(value).trim().toLowerCase(); }
function loadUserAnswers() {
  try { const parsed = JSON.parse(localStorage.getItem(ANSWER_STORAGE_KEY) || '{}'); return parsed && typeof parsed === 'object' ? parsed : {}; }
  catch (e) { return {}; }
}
function getProblemStorageId(problemIndex) {
  const problem = problems[problemIndex] || rawProblems[problemIndex] || {};
  const base = String(problem.original || '') + '::' + String(problem.masked || '');
  let hash = 0;
  for (let i = 0; i < base.length; i++) hash = ((hash << 5) - hash + base.charCodeAt(i)) | 0;
  return 'p' + Math.abs(hash);
}
function getAnswerKey(input) { return `${getProblemStorageId(Number(input.dataset.problem))}-${input.dataset.group}-${input.dataset.index}`; }
function saveUserAnswer(input) {
  const answers = loadUserAnswers();
  const key = getAnswerKey(input);
  if (input.value) answers[key] = input.value;
  else delete answers[key];
  localStorage.setItem(ANSWER_STORAGE_KEY, JSON.stringify(answers));
}
function restoreSavedAnswersForVisibleInputs() {
  const answers = loadUserAnswers();
  document.querySelectorAll('.letterInput').forEach(input => {
    const key = getAnswerKey(input);
    if (answers[key]) input.value = answers[key];
  });
  document.querySelectorAll('.wordPart').forEach(group => {
    const firstInput = group.querySelector('.letterInput');
    if (firstInput) checkGroup(firstInput);
  });
}
function checkGroup(input) {
  const problemId = Number(input.dataset.problem);
  const groupId = Number(input.dataset.group);
  const groupInputs = Array.from(document.querySelectorAll(`.letterInput[data-problem="${problemId}"][data-group="${groupId}"]`)).sort((a,b) => Number(a.dataset.index) - Number(b.dataset.index));
  const answer = problems[problemId].blanks[groupId].answer;
  const userAnswer = groupInputs.map(el => el.value).join('');
  const isComplete = groupInputs.every(el => el.value.trim());
  groupInputs.forEach(el => el.classList.remove('correct','wrong'));
  if (!isComplete) return;
  groupInputs.forEach(el => el.classList.add(normalizeAnswer(userAnswer) === normalizeAnswer(answer) ? 'correct' : 'wrong'));
}
function getAllInputs() { return Array.from(document.querySelectorAll('.letterInput')); }
function showProblems() { adminPanel.classList.add('hidden'); quizPanel.classList.remove('hidden'); }
function resetAdminEditor() {
  editingIndex = null;
  adminOriginal.value = '';
  adminMasked.value = '';
  adminMasked.dataset.synced = 'true';
  updateBlankWordCount();
  maskedUndoStack.length = 0;
  adminStatus.textContent = '';
  addProblemBtn.classList.remove('hidden');
  saveEditBtn.classList.add('hidden');
  cancelEditBtn.classList.add('hidden');
}
function tryOpenAdmin() {
  if (adminPassword.value !== ADMIN_PASSWORD) { adminPassword.value = ''; return; }
  adminPassword.value = '';
  document.getElementById('downloadDataBtn').classList.remove('hidden');
  resetAdminEditor();
  quizPanel.classList.add('hidden');
  adminPanel.classList.remove('hidden');
}
function editProblem(index) {
  const problem = rawProblems[index];
  editingIndex = index;
  adminOriginal.value = problem.original || '';
  adminMasked.value = problem.masked || '';
  adminMasked.dataset.synced = 'false';
  updateBlankWordCount();
  maskedUndoStack.length = 0;
  adminStatus.textContent = `문제 ${index + 1} 수정 중`;
  addProblemBtn.classList.add('hidden');
  saveEditBtn.classList.remove('hidden');
  cancelEditBtn.classList.remove('hidden');
}
function countBlankWords(maskedText) {
  const normalized = String(maskedText).replace(/[“”]/g, '"').replace(/[‘’]/g, "'");
  const tokens = normalized.match(/\b[A-Za-z_]+(?:['-][A-Za-z_]+)?\b/g) || [];
  return tokens.filter(token => token.includes('_')).length;
}
function updateBlankWordCount() {
  const count = countBlankWords(adminMasked.value);
  blankWordCount.textContent = `빈칸 단어 수: ${count} / 10`;
  blankWordCount.style.color = count === 10 ? '#15803d' : count > 10 ? '#dc2626' : '#2563eb';
  updateMaskedPreview();
}
function updateMaskedPreview() {
  const escaped = escapeHtml(adminMasked.value || '');
  maskedPreview.innerHTML = escaped.replace(/_+/g, match => `<span class="blankHighlight">${match}</span>`);
}
function syncAdminMaskedIfNeeded() {
  if (!adminMasked.value || adminMasked.dataset.synced === 'true') {
    adminMasked.value = adminOriginal.value;
    adminMasked.dataset.synced = 'true';
    updateBlankWordCount();
  }
}
function pushMaskedUndoState() {
  maskedUndoStack.push({
    originalValue: adminOriginal.value, maskedValue: adminMasked.value,
    synced: adminMasked.dataset.synced || 'false',
    originalSelectionStart: adminOriginal.selectionStart, originalSelectionEnd: adminOriginal.selectionEnd,
    maskedSelectionStart: adminMasked.selectionStart, maskedSelectionEnd: adminMasked.selectionEnd
  });
  if (maskedUndoStack.length > 150) maskedUndoStack.shift();
}
function undoMaskedChange() {
  const previous = maskedUndoStack.pop();
  if (!previous) return;
  adminOriginal.value = previous.originalValue;
  adminMasked.value = previous.maskedValue;
  adminMasked.dataset.synced = previous.synced;
  updateBlankWordCount();
  requestAnimationFrame(() => {
    adminOriginal.setSelectionRange(previous.originalSelectionStart || 0, previous.originalSelectionEnd || 0);
    adminMasked.setSelectionRange(previous.maskedSelectionStart || 0, previous.maskedSelectionEnd || 0);
  });
  adminStatus.textContent = '이전 상태로 되돌렸습니다.';
}
function blankSelectedLetters() {
  const start = adminOriginal.selectionStart;
  const end = adminOriginal.selectionEnd;
  const original = adminOriginal.value;
  if (start === end) { adminStatus.textContent = '빈칸으로 만들 글자를 먼저 드래그하세요.'; return; }
  pushMaskedUndoState();
  if (adminMasked.value.length !== original.length) adminMasked.value = original;
  const chars = adminMasked.value.split('');
  for (let i = start; i < end; i++) if (!isWhitespace(original[i])) chars[i] = '_';
  adminMasked.value = chars.join('');
  adminMasked.dataset.synced = 'false';
  updateBlankWordCount();
  adminStatus.textContent = '선택한 글자를 빈칸으로 바꿨습니다.';
}
function validateProblem(original, masked, problemId) {
  if (!original.trim() || !masked.trim()) throw new Error('정답 원문과 빈칸 문단이 모두 필요합니다.');
  if (!masked.includes('_')) throw new Error('빈칸 문단에 _ 가 없습니다.');
  buildQuizData(problemId, original, masked);
}
function addProblemFromAdmin() {
  const original = adminOriginal.value.trim();
  const masked = adminMasked.value.trim();
  try { validateProblem(original, masked, rawProblems.length); }
  catch (error) { adminStatus.textContent = '오류: ' + error.message; return; }
  rawProblems.push({ original, masked });
  saveRawProblems();
  rebuildProblemsFromRaw();
  resetAdminEditor();
  adminStatus.textContent = '문제를 추가했습니다.';
}
function saveEditedProblem() {
  if (editingIndex === null) { adminStatus.textContent = '수정 중인 문제가 없습니다.'; return; }
  const original = adminOriginal.value.trim();
  const masked = adminMasked.value.trim();
  try { validateProblem(original, masked, editingIndex); }
  catch (error) { adminStatus.textContent = '오류: ' + error.message; return; }
  rawProblems[editingIndex] = { original, masked };
  saveRawProblems();
  rebuildProblemsFromRaw();
  resetAdminEditor();
  adminStatus.textContent = '수정 내용을 저장했습니다.';
}
function deleteProblem(index) {
  rawProblems.splice(index, 1);
  saveRawProblems();
  rebuildProblemsFromRaw();
  resetAdminEditor();
  adminStatus.textContent = '문제를 삭제했습니다.';
}
function clearSavedProblems() {
  localStorage.removeItem(STORAGE_KEY);
  rawProblems = [];
  problems = [];
  renderAllProblems();
  renderRegisteredProblems();
  resetAdminEditor();
  adminStatus.textContent = '전체 문제를 삭제했습니다.';
}
function getCurrentProblemData() {
  const latestSaved = localStorage.getItem(STORAGE_KEY);
  let data = rawProblems;
  try { const parsed = JSON.parse(latestSaved || '[]'); if (Array.isArray(parsed) && parsed.length) data = parsed; } catch (e) {}
  return Array.isArray(data) ? data : [];
}
function downloadCurrentProblems() {
  const data = getCurrentProblemData();
  const text = JSON.stringify(data, null, 2);
  exportText.value = text;
  exportBox.classList.remove('hidden');
  try {
    const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'problems.json'; a.style.display = 'none';
    document.body.appendChild(a);
    setTimeout(() => { a.click(); a.remove(); URL.revokeObjectURL(url); }, 0);
  } catch(e) {}
}
function copyExportData() {
  exportText.focus();
  exportText.select();
  try { document.execCommand('copy'); } catch(e) {}
}
function animateRegisteredReorder(mutator) {
  const items = Array.from(registeredProblems.querySelectorAll('.registeredItem'));
  const firstRects = new Map(items.map(item => [item, item.getBoundingClientRect()]));
  mutator();
  const newItems = Array.from(registeredProblems.querySelectorAll('.registeredItem'));
  newItems.forEach(item => {
    const first = firstRects.get(item);
    if (!first) return;
    const last = item.getBoundingClientRect();
    const dx = first.left - last.left;
    const dy = first.top - last.top;
    if (!dx && !dy) return;
    item.style.transition = 'none';
    item.style.transform = `translate(${dx}px, ${dy}px)`;
    requestAnimationFrame(() => {
      item.style.transition = 'transform .18s ease,border-color .18s ease,background .18s ease,opacity .18s ease';
      item.style.transform = '';
    });
  });
}
function saveVisibleDragOrder() {
  const orderedIndexes = Array.from(registeredProblems.querySelectorAll('.registeredItem')).map(item => Number(item.dataset.adminIndex)).filter(Number.isInteger);
  if (!orderedIndexes.length) return;
  const startIndex = Math.min(...orderedIndexes);
  const reordered = rawProblems.slice();
  orderedIndexes.forEach((oldIndex, offset) => { reordered[startIndex + offset] = rawProblems[oldIndex]; });
  rawProblems = reordered;
  saveRawProblems();
  rebuildProblemsFromRaw();
  adminStatus.textContent = '문제 순서를 변경했습니다.';
}

allProblemsArea.addEventListener('input', event => {
  const input = event.target;
  if (!input.classList.contains('letterInput')) return;
  const typed = input.value.replace(/[^A-Za-z]/g, '');
  input.value = typed ? typed.slice(-1).toLowerCase() : '';
  saveUserAnswer(input);
  checkGroup(input);
  if (input.value) {
    const inputs = getAllInputs();
    const next = inputs[inputs.indexOf(input) + 1];
    if (next) next.focus();
  }
});
allProblemsArea.addEventListener('keydown', event => {
  const input = event.target;
  if (!input.classList.contains('letterInput')) return;
  const inputs = getAllInputs();
  const currentIndex = inputs.indexOf(input);
  if (event.key.length === 1 && !/^[A-Za-z]$/.test(event.key)) { event.preventDefault(); return; }
  if (event.key === 'Backspace' && !input.value) {
    const prev = inputs[currentIndex - 1];
    if (prev) {
      event.preventDefault();
      prev.focus(); prev.value = ''; prev.classList.remove('correct','wrong'); saveUserAnswer(prev); checkGroup(prev);
    }
  }
  if (event.key === 'Enter') {
    event.preventDefault();
    const next = inputs[currentIndex + 1];
    if (next) next.focus();
  }
});
allProblemsArea.addEventListener('click', event => {
  const toggleBtn = event.target.closest('[data-toggle-problem]');
  if (!toggleBtn) return;
  const problemId = Number(toggleBtn.dataset.toggleProblem);
  const block = document.querySelector(`[data-problem-block="${problemId}"]`);
  const nextCollapsed = !block.classList.contains('collapsed');
  block.classList.toggle('collapsed', nextCollapsed);
  toggleBtn.textContent = nextCollapsed ? '▾' : '▴';
  toggleBtn.title = nextCollapsed ? '펼치기' : '접기';
  toggleBtn.setAttribute('aria-label', nextCollapsed ? '펼치기' : '접기');
});
topPagination.addEventListener('click', event => {
  const prevBtn = event.target.closest('#topPrevPageBtn');
  if (prevBtn && !prevBtn.disabled) { currentPage--; renderAllProblems(); window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const nextBtn = event.target.closest('#topNextPageBtn');
  if (nextBtn && !nextBtn.disabled) { currentPage++; renderAllProblems(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
});
registeredProblems.addEventListener('click', event => {
  const editBtn = event.target.closest('[data-admin-edit]');
  if (editBtn) { editProblem(Number(editBtn.dataset.adminEdit)); return; }
  const deleteBtn = event.target.closest('[data-admin-delete]');
  if (deleteBtn) deleteProblem(Number(deleteBtn.dataset.adminDelete));
});
registeredProblems.addEventListener('dragstart', event => {
  const item = event.target.closest('.registeredItem');
  if (!item) return;
  if ((registeredSearch.value || '').trim()) { event.preventDefault(); adminStatus.textContent = '검색 중에는 순서 변경을 할 수 없습니다. 검색어를 지운 뒤 드래그하세요.'; return; }
  item.classList.add('dragging');
  event.dataTransfer.effectAllowed = 'move';
});
registeredProblems.addEventListener('dragend', event => {
  const item = event.target.closest('.registeredItem');
  if (item) item.classList.remove('dragging');
  registeredProblems.querySelectorAll('.dropCandidate').forEach(el => el.classList.remove('dropCandidate'));
});
registeredProblems.addEventListener('dragover', event => {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  const draggingItem = registeredProblems.querySelector('.registeredItem.dragging');
  const targetItem = event.target.closest('.registeredItem');
  if (!draggingItem || !targetItem || draggingItem === targetItem) return;
  registeredProblems.querySelectorAll('.dropCandidate').forEach(el => el.classList.remove('dropCandidate'));
  targetItem.classList.add('dropCandidate');
  const rect = targetItem.getBoundingClientRect();
  const insertAfter = event.clientY > rect.top + rect.height / 2;
  const referenceNode = insertAfter ? targetItem.nextSibling : targetItem;
  if (referenceNode === draggingItem || draggingItem.nextSibling === referenceNode) return;
  animateRegisteredReorder(() => registeredProblems.insertBefore(draggingItem, referenceNode));
});
registeredProblems.addEventListener('drop', event => {
  event.preventDefault();
  registeredProblems.querySelectorAll('.dropCandidate').forEach(el => el.classList.remove('dropCandidate'));
  saveVisibleDragOrder();
});
registeredPager.addEventListener('click', event => {
  if (event.target.id === 'adminPrevPageBtn' && !event.target.disabled) { adminListPage--; renderRegisteredProblems(); }
  if (event.target.id === 'adminNextPageBtn' && !event.target.disabled) { adminListPage++; renderRegisteredProblems(); }
});
registeredSearch.addEventListener('input', () => { adminListPage = 1; renderRegisteredProblems(); });
adminOriginal.addEventListener('beforeinput', pushMaskedUndoState);
adminMasked.addEventListener('beforeinput', pushMaskedUndoState);
adminOriginal.addEventListener('input', () => { syncAdminMaskedIfNeeded(); updateBlankWordCount(); });
adminMasked.addEventListener('input', () => { adminMasked.dataset.synced = 'false'; updateBlankWordCount(); });
document.addEventListener('keydown', event => {
  const isUndo = (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'z';
  if (!isUndo || adminPanel.classList.contains('hidden')) return;
  event.preventDefault();
  undoMaskedChange();
});
document.getElementById('downloadDataBtn').addEventListener('click', downloadCurrentProblems);
document.getElementById('copyExportBtn').addEventListener('click', copyExportData);
document.getElementById('closeExportBtn').addEventListener('click', () => exportBox.classList.add('hidden'));
document.getElementById('adminBackBtn').addEventListener('click', () => { resetAdminEditor(); showProblems(); });
document.getElementById('blankSelectionBtn').addEventListener('click', blankSelectedLetters);
document.getElementById('resetMaskedBtn').addEventListener('click', () => {
  pushMaskedUndoState();
  adminMasked.value = adminOriginal.value;
  adminMasked.dataset.synced = 'true';
  updateBlankWordCount();
  adminStatus.textContent = '빈칸 문단을 원문으로 초기화했습니다.';
});
addProblemBtn.addEventListener('click', addProblemFromAdmin);
saveEditBtn.addEventListener('click', saveEditedProblem);
cancelEditBtn.addEventListener('click', resetAdminEditor);
document.getElementById('clearSavedBtn').addEventListener('click', clearSavedProblems);
adminPassword.addEventListener('keydown', event => { if (event.key === 'Enter') tryOpenAdmin(); });

updateBlankWordCount();
initializeProblems();
</script>
</body>
